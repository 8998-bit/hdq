// Excel 日期转 YYYY-MM-DD（兼容序列号数字、JS Date 对象、字符串三种格式）
function excelDateToStr(val) {
    if (!val || val === '-') return '-';
    // 统一用本地时间格式化，避免 toISOString() 因 UTC+8 时差导致日期少一天
    function fmtLocalDate(d) {
        if (isNaN(d.getTime())) return '-';
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }
    // 已经是 JS Date 对象（cellDates:true 时）
    if (val instanceof Date) return fmtLocalDate(val);
    // 数字序列号（Excel 内部格式，cellDates:false 时兜底）
    if (typeof val === 'number') {
        const d = new Date(Math.round((val - 25569) * 86400 * 1000));
        return fmtLocalDate(d);
    }
    // 字符串直接返回（如 "2025-03-01"）
    return String(val).trim() || '-';
}

function importExcel(input) {
    const r = new FileReader();
    r.onload = async (e) => {
        // cellDates:true 让 XLSX 自动把日期序列号转为 JS Date 对象
        const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array', cellDates: true});
        const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        const duplicates = [];
        const toAdd = [];
        const seenInFile = new Set();
        json.forEach(row => {
            if (!row["用户名"]) return;
            const uname = String(row["用户名"]).trim();
            if (!uname) return;
            if (!isUsernameUnique(uname) || seenInFile.has(uname.toLowerCase())) {
                duplicates.push(uname);
            } else {
                seenInFile.add(uname.toLowerCase());
                toAdd.push({
                    id: 'u_'+Date.now()+Math.random(),
                    owner: DEFAULT_OWNER,
                    windows: row["窗口数"]||DEFAULT_WINDOWS,
                    username: uname,
                    password: String(row["密码"]||DEFAULT_PWD),
                    wechat: row["微信"]||'-',
                    xianyu: row["咸鱼"]||'-',
                    activeTime: excelDateToStr(row["激活时间"]),
                    amount: row["金额"]||DEFAULT_AMOUNT,
                    expiry: excelDateToStr(row["到期日期"]),
                    isStarred: false
                });
            }
        });
        if (duplicates.length > 0) {
            alert(`⚠️ 导入中止：以下 ${duplicates.length} 个用户名已存在，请修正后重新导入：\n\n${duplicates.join('\n')}`);
            input.value = ''; return;
        }
        try {
            await reserveBitUsernames(toAdd);
        } catch (error) {
            alert(`❌ 导入中止，用户名永久唯一校验失败：\n${bitSetupMessage(error)}`);
            input.value = '';
            return;
        }
        toAdd.forEach(u => db.users.push(u));
        saveToCloud(); render(); input.value = '';
    };
    r.readAsArrayBuffer(input.files[0]);
}

function downloadTemplate() { const ws = XLSX.utils.aoa_to_sheet([["归属","窗口数", "用户名", "密码", "微信", "咸鱼", "激活时间", "金额", "到期日期"]]); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "模版"); XLSX.writeFile(wb, "导入模版.xlsx"); }
function exportSelected() { const ids = Array.from(document.querySelectorAll(`.user-cb:checked`)).map(cb => cb.dataset.id); const ws = XLSX.utils.json_to_sheet(db.users.filter(u => isOwnerInScope(u) && ids.includes(u.id)).map(u => ({"归属": u.owner, "窗口数": u.windows, "用户名": u.username, "密码": u.password, "微信": u.wechat, "咸鱼": u.xianyu, "激活时间": u.activeTime, "金额": u.amount, "到期日期": u.expiry}))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "导出"); XLSX.writeFile(wb, `用户导出_${Date.now()}.xlsx`); }
async function confirmMultiUnused() {
    const rawInput = document.getElementById('multiUnusedInput').value;
    const lines = rawInput.split('\n').filter(line => line.trim());
    const duplicates = [];
    const toAdd = [];
    const seenInInput = new Set();
    lines.forEach(line => {
        const p = line.trim().split(/\s+/);
        const uname = p[0];
        if (!uname) return;
        if (!isUsernameUnique(uname) || seenInInput.has(uname.toLowerCase())) {
            duplicates.push(uname);
        } else {
            seenInInput.add(uname.toLowerCase());
            toAdd.push({ id: 'un_'+Date.now()+Math.random(), username: uname, password: p[1]||DEFAULT_PWD });
        }
    });
    if (duplicates.length > 0) {
        alert(`❌ 以下 ${duplicates.length} 个用户名已存在，全部操作已中止，请修正后重新提交：\n\n${duplicates.join('\n')}`);
        return;
    }
    try {
        await reserveBitUsernames(toAdd);
    } catch (error) {
        alert(`❌ 添加中止，用户名永久唯一校验失败：\n${bitSetupMessage(error)}`);
        return;
    }
    toAdd.forEach(u => db.unused.push(u));
    document.getElementById('multiUnusedInput').value = '';
    saveToCloud(); closeModal('multiUnusedModal'); render();
}
function openMultiUnusedModal() { document.getElementById('multiUnusedModal').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function toggleTrash(s) { document.getElementById('trashDrawer').classList.toggle('open',s); document.getElementById('overlay').classList.toggle('open',s); if(s) renderTrash(); }
function showToast() {
    const toast = document.getElementById('toastMsg');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
}

async function copyToClipboard(text) {
    if (!text || text === '-') return;
    const str = String(text);
    try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(str);
            showToast();
            return;
        }
    } catch (e) {}
    const input = document.createElement('textarea');
    input.value = str;
    document.body.appendChild(input);
    input.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(input);
    if (ok !== false) showToast();
}
function showLoading(s) { document.getElementById('loadingMask').style.display = s ? 'flex' : 'none'; }

// 页面加载：先从 localStorage 快速恢复，再从云端同步
(function initLoad() {
    const local = localStorage.getItem(STORAGE_KEY);
    if (local) {
        try {
            db = normalizeDb(JSON.parse(local));
            render();
        } catch(e) {}
    }
    syncFromCloud();
})();

// 页面关闭前确保数据保存
window.addEventListener('beforeunload', () => {
    const payload = buildMainDataPayload();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    if (_hasPendingSave && lastKnownUpdatedAt && lastKnownUpdatedAt !== 'FRESH') {
        const currentNow = new Date().toISOString();
        const query = new URLSearchParams({ id: 'eq.1', updated_at: `eq.${lastKnownUpdatedAt}` });
        try {
            fetch(`${SUPABASE_URL}/rest/v1/MainData?${query.toString()}`, {
                method: 'PATCH',
                keepalive: true,
                headers: {
                    apikey: SUPABASE_KEY,
                    Authorization: `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    Prefer: 'return=minimal'
                },
                body: JSON.stringify({ content: payload, updated_at: currentNow })
            });
        } catch (e) {}
    }
});
