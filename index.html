<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户管理系统 Cloud Sync v5.0 (Supabase)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0d; --surface: #111318; --surface2: #181c24; --border: #252c3a; 
    --accent: #f0a500; --text: #e8ecf4; --text3: #4a5568; --danger: #ff4757; 
    --success: #2ed573; --warning: #ffa502; --unused: #a78bfa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'JetBrains Mono', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; overflow-y: scroll; }
  
  .header { position:sticky; top:0; z-index:100; background: rgba(10,11,13,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 10px 20px; display:flex; align-items:center; justify-content:space-between; }
  .logo { font-family:'Syne',sans-serif; font-weight:800; color: var(--accent); font-size: 1.2rem; }
  .sync-info { font-size: 10px; color: var(--text3); margin-left: 10px; }

  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: #000; padding: 8px 20px; border-radius: 4px; font-weight: bold; font-size: 12px; z-index: 9999; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4); }
  .toast.show { opacity: 1; transform: translate(-50%, 10px); }

  .stats-bar { display:grid; grid-template-columns:repeat(5, 1fr); gap:10px; padding: 20px; width: 98%; max-width: 1600px; margin:0 auto; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px; cursor:pointer; transition: 0.2s; }
  .stat-card.active { border: 2px solid var(--accent); background: var(--surface2); }
  .stat-label { font-size:10px; color:var(--text3); }
  .stat-value { font-family:'Syne',sans-serif; font-size:18px; font-weight: 800; }

  .unused-container { width: 98%; max-width: 1600px; margin: 0 auto 20px auto; padding: 0 20px; }
  .unused-box { background: rgba(167, 139, 250, 0.05); border: 1px dashed var(--unused); border-radius: 8px; padding: 12px; }
  .unused-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .unused-item { background: var(--surface2); border: 1px solid var(--border); padding: 3px 8px; border-radius: 4px; font-size: 11px; display: flex; align-items: center; gap: 6px; }

  .main-content { width: 98%; max-width: 1600px; margin:0 auto; padding:0 20px; }
  .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width:100%; border-collapse:collapse; min-width: 1190px; table-layout: fixed; }
  th { background:var(--surface2); color:#90ee90; font-size:11px; padding:12px 10px; text-align:left; border-bottom:1px solid var(--border); white-space: nowrap; }
  
  td { padding:10px; font-size:13px; border-bottom:1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .header-stat { color: var(--accent); font-weight: 800; }
  .editable { cursor: pointer; border-bottom: 1px dashed #444; position: relative; }
  .editable:hover { background: rgba(240,165,0,0.05); color: var(--accent); }
  
  .edit-input { background: #000; border: 1px solid var(--accent); color: #fff; width: 100%; padding: 4px; border-radius: 4px; font-family: inherit; outline: none; }
  .col-filter { display: block; width: 100%; background: #000; border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 10px; padding: 3px; margin-top: 5px; box-sizing: border-box; }
  
  .btn { padding: 6px 12px; border-radius:4px; border:none; cursor:pointer; font-size:11px; font-weight:600; display:inline-flex; align-items:center; justify-content: center; gap:4px; }
  .btn-sm { padding: 4px 8px; font-size: 10px; }
  .btn-primary { background:var(--accent); color:#000; }
  .btn-success { background:var(--success); color:#000; }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border); }
  
  .star-btn { cursor: pointer; font-size: 16px; color: var(--text3); transition: 0.2s; margin-right: 5px; vertical-align: middle; }
  .star-btn.active { color: var(--warning); text-shadow: 0 0 8px rgba(255,165,2,0.5); }

  .trash-drawer { position: fixed; right: -720px; top: 0; width: 720px; max-width: 95vw; height: 100%; background: var(--surface); border-left: 1px solid var(--border); transition: 0.3s; z-index: 101; padding: 20px; box-shadow: -10px 0 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; }
  .trash-drawer.open { right: 0; }
  .trash-list-wrap { flex: 1; overflow-y: auto; margin-top: 10px; }
  .trash-row { display: grid; grid-template-columns: 30px 1fr 1.5fr 1fr 1fr 1fr 0.8fr 60px 125px; align-items: center; background: var(--surface2); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; margin-bottom: 6px; font-size: 11px; gap: 8px; }
  .trash-header { display: grid; grid-template-columns: 30px 1fr 1.5fr 1fr 1fr 1fr 0.8fr 60px 125px; padding: 0 12px 8px 12px; color: #90ee90; font-size: 10px; gap: 8px; }
  .trash-val { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .trash-status { display:flex; align-items:center; justify-content:center; min-width:0; }
  .trash-status .bit-badge, .task-cell .bit-badge { margin-top:0; }
  .task-cell { overflow:visible; }
  .trash-toolbar { display:flex; gap:10px; margin-bottom:15px; padding-bottom:15px; border-bottom:1px solid var(--border); align-items:center; }
  .trash-search-wrap { padding:0 12px 8px 12px; }

  .batch-actions { background: var(--surface2); padding: 12px 20px; display: none; align-items: center; gap: 15px; position: fixed; bottom: 0; left: 0; right: 0; border-top: 2px solid var(--accent); z-index: 99; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 100; backdrop-filter: blur(2px); }
  .overlay.open { display: block; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:1000; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); padding:20px; border-radius:8px; width:380px; border:1px solid var(--border); }
  .bit-link-btn { border-color:#3b82f6; color:#93c5fd; min-width:126px; }
  .bit-link-btn.ok { border-color:var(--success); color:var(--success); }
  .bit-link-btn.warn { border-color:var(--warning); color:var(--warning); }
  .bit-link-btn.error { border-color:var(--danger); color:var(--danger); }
  .bit-modal { width:min(980px, 96vw); max-height:90vh; display:flex; flex-direction:column; }
  .bit-route-list { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 14px; }
  .bit-route { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:9px 12px; font-size:13px; line-height:1.5; }
  .bit-route.online { border-color:var(--success); }
  .bit-route.offline { border-color:var(--danger); }
  .bit-job-toolbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px; }
  .bit-job-title { font-size:13px; color:#90ee90; font-weight:bold; white-space:nowrap; }
  .bit-job-count { color:#fff; font-size:11px; font-weight:normal; }
  .bit-job-search { width:260px; max-width:48%; background:#000; border:1px solid var(--border); border-radius:5px; color:#fff; font-size:13px; padding:7px 10px; outline:none; }
  .bit-job-search:focus { border-color:var(--accent); }
  .bit-job-list { overflow:auto; min-height:180px; border:1px solid var(--border); border-radius:6px; }
  .bit-job-row { display:grid; grid-template-columns:145px 95px 110px 140px 58px 1fr 82px; gap:9px; align-items:center; padding:10px 12px; border-bottom:1px solid var(--border); font-size:12px; line-height:1.35; }
  .bit-job-row.header { position:sticky; top:0; background:var(--surface2); color:#90ee90; z-index:1; }
  .bit-job-message { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#fff; }
  .bit-badge { display:inline-block; margin-top:3px; padding:1px 5px; border-radius:8px; border:1px solid var(--border); font-size:9px; font-weight:normal; }
  .bit-job-row .bit-badge { margin-top:0; padding:2px 6px; font-size:11px; }
  .bit-cancel-btn { padding:4px 7px; border-radius:4px; border:1px solid var(--danger); background:transparent; color:#ff8b96; font-size:10px; cursor:pointer; white-space:nowrap; }
  .bit-cancel-btn:hover { background:rgba(255,71,87,.15); }
  .bit-badge.success { color:var(--success); border-color:var(--success); }
  .bit-badge.resolved { color:var(--success); border-color:var(--success); }
  .bit-badge.pending, .bit-badge.processing, .bit-badge.retry_wait, .bit-badge.routing_required { color:var(--warning); border-color:var(--warning); }
  .bit-badge.needs_attention { color:var(--danger); border-color:var(--danger); }

  @media (max-width: 720px) {
    .trash-drawer { right:-100vw; width:100vw; max-width:100vw; padding:10px 8px; }
    .trash-list-wrap { margin-top:4px; overflow-x:hidden; }
    .trash-toolbar { flex-wrap:wrap; gap:6px; margin-bottom:10px; padding-bottom:10px; }
    .trash-toolbar .btn { padding:4px 7px; font-size:9px; }
    .trash-search-wrap { padding:0 0 6px; }
    .trash-header { display:none; }
    .trash-row {
      grid-template-columns:22px minmax(0, 1fr) minmax(68px, .7fr);
      gap:5px 7px;
      padding:8px 7px;
      font-size:10px;
      align-items:start;
    }
    .trash-cb { grid-column:1; grid-row:1; margin-top:2px; }
    .trash-col-user {
      grid-column:2;
      grid-row:1;
      white-space:normal;
      overflow:visible;
      text-overflow:clip;
      overflow-wrap:anywhere;
      word-break:break-all;
      line-height:1.25;
    }
    .trash-col-owner { grid-column:2 / -1; grid-row:2; }
    .trash-col-wechat { grid-column:2; grid-row:3; }
    .trash-col-xianyu { grid-column:3; grid-row:3; }
    .trash-col-expiry { grid-column:2; grid-row:4; }
    .trash-col-amount { grid-column:3; grid-row:4; }
    .trash-col-owner, .trash-col-wechat, .trash-col-xianyu,
    .trash-col-expiry, .trash-col-amount {
      display:block;
      white-space:normal;
      overflow:visible;
      text-overflow:clip;
      overflow-wrap:anywhere;
      line-height:1.3;
    }
    .trash-col-user::before { content:'账号：'; }
    .trash-col-owner::before { content:'归属：'; }
    .trash-col-wechat::before { content:'微信：'; }
    .trash-col-xianyu::before { content:'咸鱼：'; }
    .trash-col-expiry::before { content:'到期：'; }
    .trash-col-amount::before { content:'金额：'; }
    .trash-col-user::before, .trash-col-owner::before, .trash-col-wechat::before,
    .trash-col-xianyu::before, .trash-col-expiry::before, .trash-col-amount::before {
      color:#90ee90;
      font-size:9px;
      font-weight:normal;
    }
    .trash-status { grid-column:3; grid-row:1; justify-content:flex-end; }
    .trash-status .bit-badge { padding:1px 3px; font-size:8px; white-space:nowrap; }
    .trash-actions {
      grid-column:2 / -1;
      grid-row:5;
      display:flex;
      justify-content:flex-end;
      gap:3px;
    }
    .trash-actions .btn { padding:3px 7px !important; font-size:9px; }
  }

  @media (max-width: 360px) {
    .trash-row { grid-template-columns:20px minmax(0, 1fr) minmax(64px, .65fr); }
    .trash-status .bit-badge { padding:1px 2px; font-size:7px; }
  }
  
  .loading-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; color: var(--accent); font-weight: bold; }
</style>
</head>
<body>

<div class="toast" id="toastMsg">已复制</div>
<div class="loading-mask" id="loadingMask">☁️ Supabase 同步中...</div>

<header class="header">
  <div style="display:flex; align-items:center">
    <div class="logo">⚡ CLOUD FLOW <small style="font-size: 10px; color: var(--text3)">SUPABASE 版</small></div>
    <span class="sync-info" id="syncStatus">连接中...</span>
  </div>
  <div style="display:flex; gap:8px;">
    <button class="btn btn-ghost" onclick="syncFromCloud()">🔄 强制刷新</button>
    <button class="btn btn-ghost bit-link-btn" id="bitLinkButton" onclick="openBitLinkModal()">🔗 联动检测中</button>
    <button class="btn btn-ghost" onclick="toggleTrash(true)">🗑️ 回收站 (<span id="trashCount">0</span>)</button>
    <button class="btn btn-ghost" onclick="downloadTemplate()">📥 导出模版</button>
    <label class="btn btn-ghost" style="cursor:pointer">📤 导入 Excel <input type="file" hidden accept=".xlsx, .xls" onchange="importExcel(this)"></label>
    <button class="btn btn-secondary" onclick="openMultiUnusedModal()" style="background:var(--unused); color:#000">＋ 批量增名额</button>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="unused-container">
  <div class="unused-box">
    <div style="font-size: 11px; color: var(--unused); font-weight: bold;">🔑 待激活名额</div>
    <div class="unused-list" id="unusedGrid"></div>
  </div>
</div>

<main class="main-content">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th width="50"><input type="checkbox" id="selectAll" onclick="toggleSelectAll('userTableBody', 'selectAll')"></th>
          <th width="90">归属<input type="text" class="col-filter" data-col="owner" value="小强" readonly title="此版本仅显示归属为小强的数据"></th>
          <th width="70">窗口<span class="header-stat" id="statWindows">/0</span><input type="text" class="col-filter" data-col="windows" oninput="onFilterInput()"></th>
          <th width="140">用户<span class="header-stat" id="statUsers">/0</span><input type="text" class="col-filter" data-col="username" oninput="onFilterInput()"></th>
          <th width="110">密码<input type="text" class="col-filter" data-col="password" oninput="onFilterInput()"></th>
          <th width="100">微信<input type="text" class="col-filter" data-col="wechat" oninput="onFilterInput()"></th>
          <th width="100">咸鱼<input type="text" class="col-filter" data-col="xianyu" oninput="onFilterInput()"></th>
          <th width="115">激活时间<input type="text" class="col-filter" data-col="activeTime" oninput="onFilterInput()"></th>
          <th width="115">到期日期<input type="text" class="col-filter" data-col="expiry" oninput="onFilterInput()"></th>
          <th width="70">金额<span class="header-stat" id="statAmount">/0</span><input type="text" class="col-filter" data-col="amount" oninput="onFilterInput()"></th>
          <th width="80">状态</th>
          <th width="90">任务</th>
          <th width="150">操作</th>
        </tr>
      </thead>
      <tbody id="userTableBody"></tbody>
    </table>
  </div>
</main>

<div class="batch-actions" id="batchBar">
  <span id="batchCountText" style="font-size:12px; font-weight:bold; color: var(--accent)">已选中 0 位用户</span>
  <button class="btn btn-ghost" onclick="exportSelected()">📥 导出选中</button>
  <button class="btn" style="background:var(--warning); color:#000;" onclick="batchAction('rollback')">批量回退</button>
  <button class="btn btn-danger" onclick="batchAction('delete')">批量移至回收站</button>
  <button class="btn btn-ghost" onclick="cancelSelect()">取消选择</button>
</div>

<div class="overlay" id="overlay" onclick="toggleTrash(false)"></div>
<div class="trash-drawer" id="trashDrawer">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
    <h3 style="color:var(--danger)">🗑️ 回收站 <small style="font-size:10px; color:#fff">· 仅显示小强</small></h3>
    <button class="btn btn-ghost" onclick="toggleTrash(false)">关闭</button>
  </div>
  <div class="trash-toolbar">
    <label style="font-size:12px; display:flex; align-items:center; gap:5px; cursor:pointer;">
        <input type="checkbox" id="selectAllTrash" onclick="toggleSelectAllTrash()"> 全选
    </label>
    <button class="btn btn-sm" style="background:var(--warning); color:#000;" onclick="batchRollbackTrash()">批量回退</button>
    <button class="btn btn-success btn-sm" onclick="batchRestoreTrash()">批量续费</button>
    <button class="btn btn-danger btn-sm" onclick="batchDeleteTrash()">永久删除</button>
    <button class="btn btn-ghost btn-sm" onclick="exportTrashSelected()">📥 批量导出</button>
  </div>
  
  <div class="trash-search-wrap">
    <input type="text" id="trashSearchInput" style="width:100%; background:#000; border:1px solid var(--border); border-radius:4px; color:var(--text); font-size:11px; padding:5px 8px; box-sizing:border-box; outline:none;" placeholder="🔍 全局搜索：用户 / 微信 / 咸鱼 / 备注 / 归属..." oninput="onTrashSearchInput()">
  </div>
  <div class="trash-header">
    <div></div><div class="trash-col-owner">归属</div><div class="trash-col-user">用户/<span id="trashUserCount">0</span></div><div class="trash-col-wechat">微信</div><div class="trash-col-xianyu">咸鱼</div><div class="trash-col-expiry">到期(月日)</div><div class="trash-col-amount">金额</div><div style="text-align:center">状态</div><div class="trash-col-actions-label">操作</div>
  </div>
  <div class="trash-list-wrap" id="trashList"></div>
</div>

<div class="modal-overlay" id="multiUnusedModal">
  <div class="modal">
    <h3 style="font-size:14px; margin-bottom:10px; color:var(--unused)">批量新增名额</h3>
    <textarea id="multiUnusedInput" style="width:100%; height:180px; background:#000; border:1px solid var(--border); color:#fff; padding:10px; font-size:12px" placeholder="用户名 密码 (一行一个)"></textarea>
    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:15px">
      <button class="btn btn-ghost" onclick="closeModal('multiUnusedModal')">取消</button>
      <button class="btn btn-secondary" onclick="confirmMultiUnused()" style="background:var(--unused)">确认添加</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="bitLinkModal">
  <div class="modal bit-modal">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
      <div>
        <h3 style="font-size:17px; color:#93c5fd;">🔗 BitBrowser 联动状态</h3>
        <div id="bitLinkSummary" style="font-size:12px; color:#fff; margin-top:5px;">正在读取 MainData 零SQL任务队列...</div>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-ghost" onclick="refreshBitIntegration(false)">立即刷新</button>
        <button class="btn btn-ghost" onclick="closeModal('bitLinkModal')">关闭</button>
      </div>
    </div>
    <div id="bitRouteList" class="bit-route-list"></div>
    <div class="bit-job-toolbar">
      <div class="bit-job-title">最近联动任务 <span class="bit-job-count" id="bitJobSearchCount"></span></div>
      <input type="text" id="bitJobSearchInput" class="bit-job-search" placeholder="🔍 搜索员工号..." autocomplete="off" oninput="renderBitIntegration()">
    </div>
    <div id="bitJobList" class="bit-job-list"></div>
    <div style="font-size:12px; color:#fff; margin-top:10px; line-height:1.6;">
      本机联动程序每5秒拉取一次任务。程序或 BitBrowser 未打开时，任务会保留并等待重试；“需人工处理”会保留错误原因。
    </div>
  </div>
</div>

<script>
// ================== 核心配置 ==================
const SUPABASE_URL = 'https://xlmnfzocrlqvbzzrdshr.supabase.co'; 
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhsbW5mem9jcmxxdmJ6enJkc2hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODMyMjAsImV4cCI6MjA5MDU1OTIyMH0.Pvhl7JTz-FmOZ6J_aT8kBRve3ZrjOIIVVekr4jTZXUM';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const STORAGE_KEY = 'uf_v45_db';
const ROW_ID = 1; 

const DEFAULT_WINDOWS = '100';
const DEFAULT_AMOUNT = '32';
const DEFAULT_PWD = '123456';
const DEFAULT_OWNER = '小强';

function isOwnerInScope(record) {
    return String(record?.owner || '').trim() === DEFAULT_OWNER;
}

function isTaskInOwnerScope(task) {
    const explicitOwner = task?.sourceOwner ?? task?.recordSnapshot?.owner;
    if (String(explicitOwner || '').trim()) {
        return String(explicitOwner).trim() === DEFAULT_OWNER;
    }
    const sourceRecordId = String(task?.sourceRecordId || task?.source_record_id || '');
    const usernameNorm = String(task?.username || '').trim().toLowerCase();
    return ['users', 'trash'].some(listName =>
        (db[listName] || []).some(record =>
            isOwnerInScope(record) && (
                (sourceRecordId && String(record.id || '') === sourceRecordId) ||
                (usernameNorm && String(record.username || '').trim().toLowerCase() === usernameNorm)
            )
        )
    );
}

let db = { users: [], unused: [], trash: [], bitTasks: [], bitConnectors: [], bitInventory: [], bitUsernameRegistry: [] };
let currentFilter = 'all';
let newlyActivatedId = null;
let baseSnapshot = null;
let _isSaving = false;      // 保存锁，防止并发覆盖

let _filterTimer = null;    // 列筛选防抖

// ─────────────────── 工具函数：北京时间与日期 ───────────────────

function getBeijingDateStr() {
    const d = new Date(Date.now() + 8 * 3600000);
    const y = d.getUTCFullYear();
    const m = String(d.getUTCMonth() + 1).padStart(2, '0');
    const day = String(d.getUTCDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
}

function getBeijingTimeString() {
    const d = new Date(Date.now() + 8 * 3600000);
    const hh = String(d.getUTCHours()).padStart(2, '0');
    const mm = String(d.getUTCMinutes()).padStart(2, '0');
    const ss = String(d.getUTCSeconds()).padStart(2, '0');
    return `${hh}:${mm}:${ss}`;
}

function escapeHtml(val) {
    return String(val ?? '').replace(/[&<>"']/g, c => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[c]));
}

function displayVal(val, fallback = '-') {
    return (val === undefined || val === null || val === '') ? fallback : String(val);
}

function withDefault(val, fallback) {
    return (val === undefined || val === null || val === '') ? fallback : val;
}

function toNumber(val) {
    const n = parseFloat(val);
    return Number.isFinite(n) ? n : 0;
}

function normalizeDateStr(val) {
    if (!val || val === '-') return null;
    const s = String(val).trim();
    if (!/^\d{4}-\d{2}-\d{2}$/.test(s)) return null;
    return s;
}

function formatShortDate(dateStr) {
    if(!dateStr || dateStr === '-') return '-';
    let parts = dateStr.split('-');
    if(parts.length !== 3) return dateStr;
    return `${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
}

function getStatus(dateStr) {
    if (!dateStr || dateStr === '-') return 'expired';
    let [y, m, d] = dateStr.split('-');
    if (!y || !m || !d) return 'expired';
    const target = new Date(`${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}T00:00:00Z`);
    const today = new Date(`${getBeijingDateStr()}T00:00:00Z`);
    const diffDays = Math.round((target - today) / 86400000);
    if (diffDays < 0) return 'expired';
    if (diffDays <= 3) return 'expiring';
    return 'active';
}

// ─────────────────── BitBrowser 云端任务联动 ───────────────────

const BIT_PENDING_STATUSES = new Set(['routing_required', 'pending', 'processing', 'retry_wait']);
const BIT_SUPERSEDABLE_STATUSES = new Set(['routing_required', 'pending', 'retry_wait', 'needs_attention']);
const BIT_CANCELLABLE_STATUSES = new Set(['routing_required', 'pending', 'retry_wait', 'needs_attention']);
const BIT_STATUS_LABELS = {
    routing_required: '等待前缀路由', pending: '待执行', processing: '执行中', retry_wait: '等待重试',
    success: '已完成', needs_attention: '需人工处理', resolved: '已解决', cancelled: '已取消'
};
const BIT_ACTION_LABELS = { disable: '停用员工号', recover: '恢复员工号', delete: '清窗并删号' };

function normalizeDb(value) {
    const src = value && typeof value === 'object' ? value : {};
    return {
        ...src,
        users: Array.isArray(src.users) ? src.users : [],
        unused: Array.isArray(src.unused) ? src.unused : [],
        trash: Array.isArray(src.trash) ? src.trash : [],
        bitTasks: Array.isArray(src.bitTasks) ? src.bitTasks : [],
        bitConnectors: Array.isArray(src.bitConnectors) ? src.bitConnectors : [],
        bitInventory: Array.isArray(src.bitInventory) ? src.bitInventory : [],
        bitUsernameRegistry: Array.isArray(src.bitUsernameRegistry) ? src.bitUsernameRegistry : []
    };
}

function bitErrorText(error) {
    return String(error?.message || error?.details || error?.hint || error || '未知错误');
}

function bitSetupMessage(error) {
    return bitErrorText(error);
}

function newBitId() {
    if (globalThis.crypto?.randomUUID) return globalThis.crypto.randomUUID();
    return 'job-' + Date.now() + '-' + Math.random().toString(16).slice(2) + '-' + Math.random().toString(16).slice(2);
}

function connectorPrefixes(connector) {
    if (Array.isArray(connector?.prefixes)) return connector.prefixes.map(String).map(x => x.trim()).filter(Boolean);
    return String(connector?.accountPrefix || connector?.account_prefix || '').split(/[,，;；\s]+/).map(x => x.trim()).filter(Boolean);
}

function connectorManualAccounts(connector) {
    if (Array.isArray(connector?.manualAccounts)) return connector.manualAccounts.map(String).map(x => x.trim()).filter(Boolean);
    return String(connector?.manualAccountText || '').split(/[,，]+/).map(x => x.trim()).filter(Boolean);
}

function matchingConnectorPrefix(username, connector) {
    const norm = String(username || '').toLowerCase();
    const exact = connectorManualAccounts(connector).find(account => account.toLowerCase() === norm);
    if (exact) return '@' + exact;
    const matches = connectorPrefixes(connector).filter(prefix => norm.startsWith(prefix.toLowerCase()));
    return matches.sort((a, b) => b.length - a.length)[0] || null;
}

function findBitRoute(username) {
    const routes = (db.bitConnectors || []).map(connector => ({
        connector,
        prefix: connector.enabled === false ? null : matchingConnectorPrefix(username, connector)
    })).filter(item => item.prefix);
    routes.sort((a, b) => b.prefix.length - a.prefix.length);
    return routes[0] || null;
}

function routeBitTask(task) {
    const route = findBitRoute(task.username);
    if (!route) {
        task.targetConnectorId = null;
        task.targetPrefix = null;
        if (task.status === 'pending') task.status = 'routing_required';
        return false;
    }
    task.targetConnectorId = route.connector.id;
    task.targetPrefix = route.prefix;
    if (task.status === 'routing_required') {
        task.status = 'pending';
        task.nextRetryAt = new Date().toISOString();
    }
    return true;
}

function inventoryIdFor(username, connectorId) {
    const norm = String(username || '').trim().toLowerCase();
    const item = (db.bitInventory || []).find(row =>
        String(row.connectorId || '') === String(connectorId || '') &&
        String(row.usernameNorm || row.username || '').trim().toLowerCase() === norm
    );
    return item?.bitUserId || null;
}

function ensureBitUsernameRegistry() {
    if (!Array.isArray(db.bitUsernameRegistry)) db.bitUsernameRegistry = [];
    const existing = new Set(db.bitUsernameRegistry.map(item => String(item.usernameNorm || '').toLowerCase()).filter(Boolean));
    let changed = false;
    for (const listName of ['users', 'unused', 'trash']) {
        for (const record of db[listName] || []) {
            const username = String(record.username || '').trim();
            const norm = username.toLowerCase();
            if (!username || !record.id || existing.has(norm)) continue;
            db.bitUsernameRegistry.push({
                usernameNorm: norm,
                username,
                firstRecordId: String(record.id),
                firstSeen: new Date().toISOString()
            });
            existing.add(norm);
            changed = true;
        }
    }
    return changed;
}

function normalizeBitTask(job, extra = {}) {
    if (!job || !job.id) return null;
    return {
        ...extra,
        ...job,
        id: String(job.id),
        sourceRecordId: String(job.source_record_id ?? job.sourceRecordId ?? extra.sourceRecordId ?? ''),
        dedupeKey: String(job.dedupe_key ?? job.dedupeKey ?? extra.dedupeKey ?? ''),
        username: String(job.username ?? extra.username ?? ''),
        action: String(job.action ?? extra.action ?? ''),
        status: String(job.status ?? extra.status ?? 'pending'),
        targetConnectorId: job.target_connector_id ?? job.targetConnectorId ?? extra.targetConnectorId ?? null,
        targetPrefix: job.target_prefix ?? job.targetPrefix ?? extra.targetPrefix ?? null,
        bitUserId: job.bit_user_id ?? job.bitUserId ?? extra.bitUserId ?? null,
        resultCode: String(job.result_code !== undefined ? (job.result_code || '') : (job.resultCode ?? extra.resultCode ?? '')),
        lastError: String(job.last_error !== undefined ? (job.last_error || '') : (job.lastError ?? extra.lastError ?? '')),
        attempts: Number(job.attempts ?? extra.attempts ?? 0),
        nextRetryAt: String(job.next_retry_at ?? job.nextRetryAt ?? extra.nextRetryAt ?? new Date().toISOString()),
        claimedBy: job.claimed_by ?? job.claimedBy ?? extra.claimedBy ?? null,
        claimUntil: job.claim_until ?? job.claimUntil ?? extra.claimUntil ?? null,
        updatedAt: String(job.updated_at ?? job.updatedAt ?? extra.updatedAt ?? new Date().toISOString()),
        createdAt: String(job.created_at ?? job.createdAt ?? extra.createdAt ?? new Date().toISOString()),
        completedAt: job.completed_at ?? job.completedAt ?? extra.completedAt ?? null
    };
}

function rememberBitTask(job, extra = {}) {
    if (!job || !job.id) return false;
    if (!Array.isArray(db.bitTasks)) db.bitTasks = [];
    const index = db.bitTasks.findIndex(item => String(item.id) === String(job.id));
    const previous = index >= 0 ? db.bitTasks[index] : {};
    const task = normalizeBitTask(job, { ...previous, ...extra });
    if (!task) return false;
    if (index < 0) {
        db.bitTasks.unshift(task);
        return true;
    }
    const merged = { ...db.bitTasks[index], ...task };
    if (JSON.stringify(merged) === JSON.stringify(db.bitTasks[index])) return false;
    db.bitTasks[index] = merged;
    return true;
}

function resolveSupersededBitTasks() {
    const groups = new Map();
    for (const task of db.bitTasks || []) {
        if (!isTaskInOwnerScope(task)) continue;
        const usernameNorm = String(task.username || '').trim().toLowerCase();
        if (!usernameNorm) continue;
        if (!groups.has(usernameNorm)) groups.set(usernameNorm, []);
        groups.get(usernameNorm).push(task);
    }

    let changed = false;
    const now = new Date().toISOString();
    for (const tasks of groups.values()) {
        let newest = tasks[0];
        let newestTime = Date.parse(newest.createdAt || '') || 0;
        for (const task of tasks.slice(1)) {
            const taskTime = Date.parse(task.createdAt || '') || 0;
            if (taskTime > newestTime) {
                newest = task;
                newestTime = taskTime;
            }
        }

        for (const task of tasks) {
            if (task === newest || !BIT_SUPERSEDABLE_STATUSES.has(task.status)) continue;
            const wasAttention = task.status === 'needs_attention';
            task.status = wasAttention ? 'resolved' : 'cancelled';
            task.resultCode = wasAttention ? 'resolved_by_newer_task' : 'superseded_by_newer_task';
            task.lastError = wasAttention
                ? '该问题已由同一员工号的更新任务接管，自动标记为已解决。'
                : '同一员工号已有时间更新的任务，本任务不再执行。';
            task.claimedBy = null;
            task.claimUntil = null;
            task.completedAt = now;
            task.updatedAt = now;
            applyTaskToRecords(task);
            changed = true;
        }
    }
    return changed;
}

function collectRecordBitTasks() {
    let changed = false;
    ['users', 'unused', 'trash'].forEach(listName => {
        for (const record of db[listName] || []) {
            if (!isOwnerInScope(record)) continue;
            if (!record.bitJobId) continue;
            const existing = (db.bitTasks || []).find(item => String(item.id) === String(record.bitJobId));
            if (existing) continue;
            const stableTime = record.bitSyncUpdatedAt || existing?.updatedAt || '1970-01-01T00:00:00.000Z';
            changed = rememberBitTask({
                id: record.bitJobId,
                username: record.username,
                action: record.bitSyncAction,
                status: record.bitSyncStatus || 'pending',
                last_error: record.bitSyncMessage || '',
                source_record_id: record.id,
                dedupe_key: `legacy:${record.bitJobId}`,
                next_retry_at: stableTime,
                updated_at: stableTime,
                created_at: existing?.createdAt || stableTime
            }) || changed;
        }
    });
    return changed;
}

function applyTaskToRecords(task) {
    let changed = false;
    for (const listName of ['users', 'unused', 'trash']) {
        for (const record of db[listName] || []) {
            if (String(record.bitJobId || '') !== String(task.id)) continue;
            const before = `${record.bitSyncStatus || ''}|${record.bitSyncAction || ''}|${record.bitSyncMessage || ''}|${record.bitSyncUpdatedAt || ''}`;
            record.bitSyncStatus = task.status;
            record.bitSyncAction = task.action;
            record.bitSyncMessage = task.lastError || task.resultCode || BIT_STATUS_LABELS[task.status] || task.status;
            record.bitSyncUpdatedAt = task.updatedAt;
            const after = `${record.bitSyncStatus || ''}|${record.bitSyncAction || ''}|${record.bitSyncMessage || ''}|${record.bitSyncUpdatedAt || ''}`;
            if (before !== after) changed = true;
        }
    }
    return changed;
}

function attachBitJob(record, job) {
    const task = normalizeBitTask(job, {
        sourceRecordId: record.id,
        username: record.username
    });
    if (!task) throw new Error('没有生成有效的联动任务编号。');
    rememberBitTask(task);
    record.bitJobId = task.id;
    record.bitSyncAction = task.action;
    record.bitSyncStatus = task.status;
    record.bitSyncMessage = task.lastError || BIT_STATUS_LABELS[task.status] || task.status;
    record.bitSyncUpdatedAt = task.updatedAt;
    renderBitIntegration();
    return task;
}

function newBitDedupeKey(action, record, suffix = '') {
    const tail = suffix || `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    return `${action}:${record.id}:${tail}`;
}

async function enqueueBitJob(record, action, dedupeKey) {
    if (!record || !String(record.username || '').trim()) throw new Error('记录缺少员工用户名。');
    const existing = (db.bitTasks || []).find(task => String(task.dedupeKey || '') === String(dedupeKey));
    if (existing) return attachBitJob(record, existing);
    const now = new Date().toISOString();
    const job = {
        id: newBitId(),
        dedupeKey,
        sourceRecordId: String(record.id),
        username: String(record.username).trim(),
        action,
        status: 'routing_required',
        targetConnectorId: null,
        targetPrefix: null,
        bitUserId: null,
        attempts: 0,
        nextRetryAt: now,
        claimedBy: null,
        claimUntil: null,
        resultCode: '',
        lastError: '',
        sourceOwner: String(record.owner || ''),
        recordSnapshot: action === 'delete' ? JSON.parse(JSON.stringify(record)) : null,
        createdAt: now,
        updatedAt: now,
        completedAt: null
    };
    routeBitTask(job);
    job.bitUserId = inventoryIdFor(job.username, job.targetConnectorId);
    rememberBitTask(job);
    resolveSupersededBitTasks();
    bitIntegrationAvailable = true;
    bitIntegrationMessage = '零SQL任务已写入MainData，等待本机连接器处理';
    return attachBitJob(record, job);
}

async function reserveBitUsernames(items) {
    if (!items.length) return true;
    ensureBitUsernameRegistry();
    const pending = new Map();
    for (const item of items) {
        const username = String(item.username || '').trim();
        const recordId = String(item.id || '').trim();
        const norm = username.toLowerCase();
        if (!username || !recordId) throw new Error('用户名和记录ID不能为空。');
        const duplicateInput = pending.get(norm);
        if (duplicateInput && duplicateInput !== recordId) throw new Error(`用户名“${username}”在本次输入中重复。`);
        pending.set(norm, recordId);
        const existing = (db.bitUsernameRegistry || []).find(row => String(row.usernameNorm || '').toLowerCase() === norm);
        if (existing && String(existing.firstRecordId) !== recordId) {
            throw new Error(`用户名“${username}”已被永久使用，不能再次创建。`);
        }
    }
    for (const item of items) {
        const username = String(item.username).trim();
        const norm = username.toLowerCase();
        if (!(db.bitUsernameRegistry || []).some(row => String(row.usernameNorm || '').toLowerCase() === norm)) {
            db.bitUsernameRegistry.push({
                usernameNorm: norm,
                username,
                firstRecordId: String(item.id),
                firstSeen: new Date().toISOString()
            });
        }
    }
    bitIntegrationAvailable = true;
    bitIntegrationMessage = '永久用户名记录保存在MainData中';
    renderBitIntegration();
    return true;
}

function applyManualTaskCancellation(state, taskId, nowText = new Date().toISOString()) {
    const task = (state.bitTasks || []).find(item => String(item.id) === String(taskId));
    if (!task) return { ok: false, reason: 'missing', status: '' };
    if (!BIT_CANCELLABLE_STATUSES.has(String(task.status || ''))) {
        return { ok: false, reason: 'not_cancellable', status: String(task.status || '') };
    }

    task.status = 'cancelled';
    task.resultCode = 'cancelled_by_user';
    task.lastError = '用户已手动取消，任务不会执行。';
    task.claimedBy = null;
    task.claimUntil = null;
    task.completedAt = nowText;
    task.updatedAt = nowText;

    let restoredToTrash = false;
    if (task.action === 'delete' && task.recordSnapshot && typeof task.recordSnapshot === 'object') {
        const snapshot = JSON.parse(JSON.stringify(task.recordSnapshot));
        const recordId = String(snapshot.id || task.sourceRecordId || '');
        const alreadyExists = ['users', 'unused', 'trash'].some(listName =>
            (state[listName] || []).some(record => String(record.id || '') === recordId)
        );
        if (recordId && !alreadyExists) {
            snapshot.bitJobId = task.id;
            snapshot.bitSyncAction = 'delete';
            snapshot.bitSyncStatus = 'cancelled';
            snapshot.bitSyncMessage = task.lastError;
            snapshot.bitSyncUpdatedAt = nowText;
            delete snapshot._bitPendingRecoverKey;
            state.trash.unshift(snapshot);
            restoredToTrash = true;
        }
    }

    for (const listName of ['users', 'unused', 'trash']) {
        for (const record of state[listName] || []) {
            if (String(record.bitJobId || '') !== String(task.id)) continue;
            record.bitSyncAction = task.action;
            record.bitSyncStatus = task.status;
            record.bitSyncMessage = task.lastError;
            record.bitSyncUpdatedAt = nowText;
        }
    }
    return { ok: true, task, restoredToTrash };
}

async function cancelBitTask(taskId) {
    const localTask = (db.bitTasks || []).find(item => String(item.id) === String(taskId));
    if (!localTask) return alert('找不到这条任务，请先刷新。');
    if (!BIT_CANCELLABLE_STATUSES.has(String(localTask.status || ''))) {
        return alert(`该任务当前为“${BIT_STATUS_LABELS[localTask.status] || localTask.status}”，已经不能取消。`);
    }
    if (!confirm(`确定取消「${localTask.username}」的“${BIT_ACTION_LABELS[localTask.action] || localTask.action}”任务？\n\n取消成功后，这条任务不会被联动程序执行。`)) return;

    showLoading(true);
    try {
        for (let attempt = 0; attempt < 8; attempt++) {
            const { data, error } = await supabaseClient.from('MainData')
                .select('content, updated_at').eq('id', ROW_ID).single();
            if (error) throw error;
            if (!data) throw new Error('云端没有返回MainData。');

            let content = data.content;
            if (typeof content === 'string') {
                try { content = JSON.parse(content); } catch (parseError) { content = {}; }
            }
            const cloudState = normalizeDb(content);
            const nowText = new Date().toISOString();
            const result = applyManualTaskCancellation(cloudState, taskId, nowText);
            if (!result.ok) {
                db = cloudState;
                baseSnapshot = JSON.parse(JSON.stringify(db));
                lastKnownUpdatedAt = data.updated_at;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(buildMainDataPayload()));
                render();
                renderTrash();
                const statusText = result.reason === 'missing'
                    ? '任务已不存在'
                    : `任务已经变为“${BIT_STATUS_LABELS[result.status] || result.status}”`;
                alert(`取消失败：${statusText}。如果已经执行中，则不能强行中断。`);
                return;
            }

            const saveResult = await supabaseClient.from('MainData')
                .update({ content: cloudState, updated_at: nowText })
                .eq('id', ROW_ID)
                .eq('updated_at', data.updated_at)
                .select();
            if (saveResult.error) throw saveResult.error;
            if (saveResult.data && saveResult.data.length > 0) {
                db = cloudState;
                baseSnapshot = JSON.parse(JSON.stringify(db));
                lastKnownUpdatedAt = nowText;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(buildMainDataPayload()));
                document.getElementById('syncStatus').innerText = `✅ 任务已取消 ${getBeijingTimeString()}`;
                render();
                renderTrash();
                alert(result.restoredToTrash
                    ? '✅ 任务已取消，删除前的账号记录也已恢复到回收站。'
                    : '✅ 任务已取消，联动程序不会再执行这条任务。');
                return;
            }
            await new Promise(resolve => setTimeout(resolve, 80 * (attempt + 1)));
        }
        throw new Error('云端数据持续变化，暂时无法安全取消，请立即重试。');
    } catch (error) {
        alert(`❌ 取消任务失败：\n${bitSetupMessage(error)}`);
    } finally {
        showLoading(false);
    }
}

function renderBitIntegration() {
    const button = document.getElementById('bitLinkButton');
    const summary = document.getElementById('bitLinkSummary');
    const routeList = document.getElementById('bitRouteList');
    const jobList = document.getElementById('bitJobList');
    const jobSearchInput = document.getElementById('bitJobSearchInput');
    const jobSearchCount = document.getElementById('bitJobSearchCount');
    if (!button || !summary || !routeList || !jobList) return;

    const tasks = (db.bitTasks || []).filter(isTaskInOwnerScope).sort((a, b) =>
        String(b.updatedAt || '').localeCompare(String(a.updatedAt || ''))
    );
    const jobSearchValue = String(jobSearchInput?.value || '').trim().toLowerCase();
    const visibleTasks = jobSearchValue
        ? tasks.filter(task => String(task.username || '').toLowerCase().includes(jobSearchValue))
        : tasks;
    if (jobSearchCount) {
        jobSearchCount.textContent = jobSearchValue
            ? `（搜索结果 ${visibleTasks.length}/${tasks.length}）`
            : `（共 ${tasks.length} 条）`;
    }
    const pending = tasks.filter(task => BIT_PENDING_STATUSES.has(task.status)).length;
    const attention = tasks.filter(task => task.status === 'needs_attention').length;
    const online = bitConnectorRoutes.filter(route => route.online).length;

    button.classList.remove('ok', 'warn', 'error');
    if (bitIntegrationAvailable === false) {
        button.classList.add('error');
        button.textContent = '🔗 联动未初始化';
        summary.textContent = bitIntegrationMessage;
    } else if (attention > 0) {
        button.classList.add('error');
        button.textContent = `🔗 需处理 ${attention}`;
        summary.textContent = `有 ${attention} 个任务需要人工处理，待执行/重试 ${pending} 个。`;
    } else if (bitIntegrationAvailable === true && online > 0) {
        button.classList.add('ok');
        button.textContent = `🔗 在线 ${online} · 待办 ${pending}`;
        summary.textContent = `${online}/${bitConnectorRoutes.length} 个连接器在线，任务每5秒刷新。`;
    } else if (bitIntegrationAvailable === true) {
        button.classList.add('warn');
        button.textContent = `🔗 离线 · 待办 ${pending}`;
        summary.textContent = bitConnectorRoutes.length ? '连接器当前离线，任务会保留等待本机程序上线。' : '尚未绑定本机连接器，请打开联动程序填写账号前缀并绑定。';
    } else {
        button.textContent = '🔗 联动检测中';
        summary.textContent = bitIntegrationMessage;
    }

    routeList.innerHTML = bitConnectorRoutes.length ? bitConnectorRoutes.map(route => {
        const seen = route.last_seen ? new Date(route.last_seen).toLocaleString('zh-CN', { hour12: false }) : '从未上线';
        return `<div class="bit-route ${route.online ? 'online' : 'offline'}">
            ${route.online ? '🟢' : '🔴'} ${escapeHtml(route.display_name)}　前缀：<b>${escapeHtml(route.account_prefix)}</b><br>
            <span style="color:#fff">最后心跳：${escapeHtml(seen)}</span>
        </div>`;
    }).join('') : '<div style="font-size:10px; color:#fff">暂无已绑定连接器</div>';

    const rows = visibleTasks.slice(0, 100).map(task => {
        const label = BIT_STATUS_LABELS[task.status] || task.status;
        const message = task.lastError || task.resultCode || '-';
        const updated = task.updatedAt ? new Date(task.updatedAt).toLocaleString('zh-CN', { hour12: false }) : '-';
        const encodedTaskId = encodeURIComponent(String(task.id || '')).replace(/'/g, '%27');
        const cancelAction = BIT_CANCELLABLE_STATUSES.has(task.status)
            ? `<button class="bit-cancel-btn" onclick="cancelBitTask(decodeURIComponent('${encodedTaskId}'))">取消任务</button>`
            : '-';
        return `<div class="bit-job-row">
            <div title="${escapeHtml(task.username)}"><b>${escapeHtml(task.username || '-')}</b></div>
            <div>${escapeHtml(BIT_ACTION_LABELS[task.action] || task.action || '-')}</div>
            <div><span class="bit-badge ${escapeHtml(task.status)}">${escapeHtml(label)}</span></div>
            <div>${escapeHtml(updated)}</div>
            <div>${Number(task.attempts || 0)} 次</div>
            <div class="bit-job-message" title="${escapeHtml(message)}">${escapeHtml(message)}</div>
            <div>${cancelAction}</div>
        </div>`;
    }).join('');
    jobList.innerHTML = `<div class="bit-job-row header"><div>员工号</div><div>动作</div><div>状态</div><div>更新时间</div><div>尝试</div><div>结果/错误</div><div>操作</div></div>` +
        (rows || `<div style="text-align:center; padding:35px; color:#fff; font-size:13px;">${jobSearchValue ? '没有找到匹配的员工号' : '暂无联动任务'}</div>`);
}

async function refreshBitIntegration(silent = true) {
    if (_bitRefreshPromise) return _bitRefreshPromise;
    _bitRefreshPromise = (async () => {
        let changed = collectRecordBitTasks();
        changed = ensureBitUsernameRegistry() || changed;
        changed = resolveSupersededBitTasks() || changed;
        for (const task of db.bitTasks || []) {
            if (!isTaskInOwnerScope(task)) continue;
            if (task.status === 'routing_required') {
                const before = `${task.targetConnectorId || ''}|${task.status}`;
                routeBitTask(task);
                if (`${task.targetConnectorId || ''}|${task.status}` !== before) changed = true;
            }
            changed = applyTaskToRecords(task) || changed;
        }
        const now = Date.now();
        bitConnectorRoutes = (db.bitConnectors || []).map(connector => {
            const lastSeen = connector.lastSeen || connector.last_seen || null;
            const seenAt = lastSeen ? new Date(lastSeen).getTime() : 0;
            return {
                connector_id: connector.id,
                display_name: connector.displayName || connector.display_name || '未命名连接器',
                account_prefix: [
                    connectorPrefixes(connector).join(','),
                    connectorManualAccounts(connector).length ? `指定：${connectorManualAccounts(connector).join(',')}` : ''
                ].filter(Boolean).join('；') || '未配置',
                last_seen: lastSeen,
                online: connector.enabled !== false && Number.isFinite(seenAt) && now - seenAt < 30000
            };
        });
        bitIntegrationAvailable = true;
        bitIntegrationMessage = '零SQL模式：任务和连接器状态直接保存在MainData中';
        renderBitIntegration();
        if (changed && lastKnownUpdatedAt && !_hasPendingSave) saveToCloud(true);
        return changed;
    })();
    try {
        return await _bitRefreshPromise;
    } finally {
        _bitRefreshPromise = null;
    }
}

async function processExpiredUsers() {
    const expired = db.users.filter(user => isOwnerInScope(user) && getStatus(user.expiry) === 'expired');
    if (!expired.length) return 0;
    let moved = 0;
    for (const user of expired) {
        const expiryKey = normalizeDateStr(user.expiry) || 'unknown-date';
        await enqueueBitJob(user, 'disable', `expiry:${user.id}:${expiryKey}`);
        const index = db.users.findIndex(item => item.id === user.id);
        if (index >= 0) {
            db.trash.unshift(db.users.splice(index, 1)[0]);
            moved++;
        }
    }
    if (moved) saveToCloud(true);
    return moved;
}

// ─────────────────── Supabase 同步 ───────────────────

async function syncFromCloud(silent = false) {
    if (_isSyncing) return;
    // 如果正在保存或者本地刚做了修改还在排队，一律跳过拉取，防止云端旧数据覆盖正在处理的表单！
    if (_isSaving || _hasPendingSave) {
        console.log('[sync] 正在保存或排队保存中，跳过此次同步');
        return;
    }
    // 如果后台静默刷新时，检测到用户正在打字编辑，则放弃本次刷新以防打断操作
    if (silent && document.querySelector('.edit-input')) {
        return;
    }
    _isSyncing = true;
    if (!silent) showLoading(true);
    try {
        const { data, error } = await supabaseClient.from('MainData').select('content, updated_at').eq('id', ROW_ID).single();
        if (error) throw error;
        
        // 【防御性拦截】等待网络请求期间，用户又做了本地修改？
        if (_isSaving || _hasPendingSave) {
            console.log('[sync] 请求期间发生本地修改，抛弃本次返回版本');
            if (!silent) showLoading(false);
            return;
        }

        if (data && data.content) {
            lastKnownUpdatedAt = data.updated_at || 'FRESH';
            // 兼容 content 可能是字符串或对象
            let parsed = data.content;
            if (typeof parsed === 'string') {
                try { parsed = JSON.parse(parsed); } catch(e) { parsed = {}; }
            }
            db = normalizeDb(parsed);
            baseSnapshot = JSON.parse(JSON.stringify(db));
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            document.getElementById('syncStatus').innerText = `✅ 云端同步 ${getBeijingTimeString()}`;
        }
        render();
        await refreshBitIntegration(true);
        await processExpiredUsers();
        render();
    } catch (err) {
        console.error('[sync] 同步失败:', err);
        // 同步失败时尝试从 localStorage 恢复
        const local = localStorage.getItem(STORAGE_KEY);
        if (local) {
            try { db = normalizeDb(JSON.parse(local)); render(); } catch(e) {}
        }
        document.getElementById('syncStatus').innerText = "❌ 同步失败";
    } finally {
        _isSyncing = false;
        if (!silent) showLoading(false);
    }
}

// 防抖保存：多次快速编辑只触发一次上传
function buildMainDataPayload() {
    return {
        users: db.users,
        unused: db.unused,
        trash: db.trash,
        bitTasks: db.bitTasks || [],
        bitConnectors: db.bitConnectors || [],
        bitInventory: db.bitInventory || [],
        bitUsernameRegistry: db.bitUsernameRegistry || []
    };
}

function saveToCloud(silent = false) {
    _isSilentSave = silent;
    _hasPendingSave = true; // 标记本地有新修改
    // 立即保存到 localStorage（防止页面关闭丢数据）
    localStorage.setItem(STORAGE_KEY, JSON.stringify(buildMainDataPayload()));
    document.getElementById('syncStatus').innerText = "☁️ 等待上传...";
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(() => _doSaveToCloud(), 500);
}

async function _doSaveToCloud() {
    if (_isSaving) {
        // 如果正在保存，延迟重试
        clearTimeout(_saveTimer);
        _saveTimer = setTimeout(() => _doSaveToCloud(), 600);
        return;
    }
    _hasPendingSave = false; // 进入实际保存过程
    _isSaving = true;
    const isSilent = _isSilentSave;
    const statusEl = document.getElementById('syncStatus');
    statusEl.innerText = "☁️ 正在上传...";

    if (!lastKnownUpdatedAt) {
        if (!isSilent) alert("⚠️ 启动保护拒绝保存：\n您尚未成功获取过云端版本号。为防止意外覆盖他人的存档网络数据，请先点击【🔄 强制刷新】后再尝试进行操作！");
        statusEl.innerText = "❌ 警告: 缺少初始同步验证";
        _isSaving = false;
        return;
    }

    // 保存为对象（不是 JSON 字符串），让 Supabase jsonb 正确存储
    const payload = buildMainDataPayload();
    const currentNow = new Date().toISOString();
    try {
        let opResult;
        if (lastKnownUpdatedAt === 'FRESH') {
            opResult = await supabaseClient.from('MainData').upsert({ id: ROW_ID, content: payload, updated_at: currentNow }).select();
        } else {
            // 附带并发检查条件的 update 操作
            opResult = await supabaseClient.from('MainData')
                .update({ content: payload, updated_at: currentNow })
                .eq('id', ROW_ID)
                .eq('updated_at', lastKnownUpdatedAt)
                .select();
        }

        if (opResult.error) throw opResult.error;

        if (lastKnownUpdatedAt !== 'FRESH' && (!opResult.data || opResult.data.length === 0)) {
            if (isSilent) {
                console.log("[save] 后台自动保存遇到冲突，将放弃并重新同步");
                _isSaving = false;
                setTimeout(() => syncFromCloud(true), 100);
                return;
            }
            console.log("[save] 并发冲突，启动三向合并自愈机制");
            _isSaving = false;
            statusEl.innerHTML = `<span style="color:var(--warning); font-weight:bold;">☁️ 冲突解决中，自动合并...</span>`;
            setTimeout(() => autoResolveConflict(), 0);
            return;
        }

        lastKnownUpdatedAt = currentNow;
        baseSnapshot = JSON.parse(JSON.stringify(payload));
        statusEl.innerText = `✅ 保存成功 ${getBeijingTimeString()}`;
        if (_saveRetryTimer) { clearTimeout(_saveRetryTimer); _saveRetryTimer = null; }
    } catch (err) {
        console.error('[save] 上传失败:', err);
        _hasPendingSave = true;
        statusEl.innerText = "⚠️ 网络失败，仅本地保存（待重试）";
        if (!_saveRetryTimer) {
            _saveRetryTimer = setTimeout(() => {
                _saveRetryTimer = null;
                if (_hasPendingSave && !_isSaving) _doSaveToCloud();
            }, 5000);
        }
    } finally {
        _isSaving = false;
    }
}
async function autoResolveConflict() {
    showLoading(true);
    let latestData = null;
    let latestUpdatedAt = null;
    try {
        const { data, error } = await supabaseClient.from('MainData').select('content, updated_at').eq('id', ROW_ID).single();
        if (error) throw error;
        if (data && data.content) {
            latestUpdatedAt = data.updated_at;
            let parsed = data.content;
            if (typeof parsed === 'string') { try { parsed = JSON.parse(parsed); } catch(e) { parsed = {}; } }
            latestData = normalizeDb(parsed);
        }
    } catch (err) {
        console.error("抓取最新数据合并失败", err);
        showLoading(false);
        alert("网络异常导致合并失败，请手动强制刷新！");
        return;
    }

    if (!baseSnapshot || !latestData) {
        console.warn("无有效基线快照，强制重载...");
        syncFromCloud(false);
        return;
    }

    const localData = buildMainDataPayload();

    function isEqualItem(a, b) {
        if (!a && !b) return true;
        if (!a || !b) return false;
        const ka = Object.keys(a), kb = Object.keys(b);
        if (ka.length !== kb.length) return false;
        for (let k of ka) if (a[k] !== b[k]) return false;
        return true;
    }

    let hasActivationClash = false;
    let hasUsernameClash = false;

    function globallyMerge(baseObj, localObj, remoteObj) {
        function extractMap(dbObj) {
            const m = new Map();
            ['users','unused','trash'].forEach(listName => {
                for (let item of dbObj[listName] || []) {
                    m.set(item.id, { list: listName, data: item });
                }
            });
            return m;
        }

        const baseMap = extractMap(baseObj);
        const localMap = extractMap(localObj);
        const remoteMap = extractMap(remoteObj);
        const allIds = new Set([...baseMap.keys(), ...localMap.keys(), ...remoteMap.keys()]);
        const finalIds = new Map();

        for (let id of allIds) {
            const baseInfo = baseMap.get(id);
            const localInfo = localMap.get(id);
            const remoteInfo = remoteMap.get(id);

            const isLocalSame = isEqualItem(localInfo?.data, baseInfo?.data) && localInfo?.list === baseInfo?.list;
            const isRemoteSame = isEqualItem(remoteInfo?.data, baseInfo?.data) && remoteInfo?.list === baseInfo?.list;

            if (isLocalSame) {
                if (remoteInfo) finalIds.set(id, remoteInfo);
            } else if (isRemoteSame) {
                if (localInfo) finalIds.set(id, localInfo);
            } else {
                // 冲突处理特判：如果两人用旧页面同时激活了同一个待激活账号
                if (baseInfo?.list === 'unused' && localInfo?.list === 'users' && remoteInfo?.list === 'users') {
                    hasActivationClash = true;
                    if (remoteInfo) finalIds.set(id, remoteInfo);
                } else {
                    if (localInfo) finalIds.set(id, localInfo);
                }
            }
        }

        const newDb = { users: [], unused: [], trash: [], bitTasks: [], bitConnectors: [], bitInventory: [], bitUsernameRegistry: [] };
        ['users','unused','trash'].forEach(listName => {
            const added = new Set();
            for (let item of localObj[listName] || []) {
                const finalInfo = finalIds.get(item.id);
                if (finalInfo && finalInfo.list === listName) {
                    newDb[listName].push(finalInfo.data);
                    added.add(item.id);
                }
            }
            for (let item of remoteObj[listName] || []) {
                const finalInfo = finalIds.get(item.id);
                if (finalInfo && finalInfo.list === listName && !added.has(item.id)) {
                    newDb[listName].push(finalInfo.data);
                }
            }
        });
        const taskMap = new Map();
        for (const task of [...(remoteObj.bitTasks || []), ...(localObj.bitTasks || [])]) {
            if (!task?.id) continue;
            const existing = taskMap.get(String(task.id));
            if (!existing || String(task.updatedAt || '') >= String(existing.updatedAt || '')) {
                taskMap.set(String(task.id), task);
            }
        }
        newDb.bitTasks = [...taskMap.values()];

        const connectorMap = new Map();
        for (const connector of [...(localObj.bitConnectors || []), ...(remoteObj.bitConnectors || [])]) {
            if (!connector?.id) continue;
            const key = String(connector.id);
            const existing = connectorMap.get(key);
            if (!existing || String(connector.updatedAt || connector.lastSeen || '') >= String(existing.updatedAt || existing.lastSeen || '')) {
                connectorMap.set(key, connector);
            }
        }
        newDb.bitConnectors = [...connectorMap.values()];

        const inventoryMap = new Map();
        for (const item of [...(localObj.bitInventory || []), ...(remoteObj.bitInventory || [])]) {
            const key = `${item?.connectorId || ''}|${String(item?.usernameNorm || item?.username || '').toLowerCase()}`;
            if (key === '|') continue;
            const existing = inventoryMap.get(key);
            if (!existing || String(item.lastSeen || '') >= String(existing.lastSeen || '')) inventoryMap.set(key, item);
        }
        newDb.bitInventory = [...inventoryMap.values()];

        const registryMap = new Map();
        for (const item of [...(remoteObj.bitUsernameRegistry || []), ...(localObj.bitUsernameRegistry || [])]) {
            const key = String(item?.usernameNorm || item?.username || '').toLowerCase();
            if (!key) continue;
            const existing = registryMap.get(key);
            if (existing && String(existing.firstRecordId) !== String(item.firstRecordId)) {
                hasUsernameClash = true;
                continue;
            }
            if (!existing) registryMap.set(key, item);
        }
        newDb.bitUsernameRegistry = [...registryMap.values()];
        return newDb;
    }

    const mergedDb = globallyMerge(baseSnapshot, localData, latestData);

    if (hasActivationClash || hasUsernameClash) {
        alert(hasUsernameClash
            ? "⚠️ 用户名永久唯一冲突！\n\n另一个页面刚刚抢先使用了相同用户名，本次本地操作已取消，系统已加载云端最新数据。"
            : "⚠️ 手慢无提示！\n\n您刚刚尝试激活的名额，已被其他同事抢先一步激活！\n为防止生成重复记录，您本次的激活操作已被拦截取消。\n\n系统已自动为您重新拉取最新的名额分配状态。"
        );
        showLoading(false);
        document.getElementById('syncStatus').innerHTML = `<span style="color:var(--danger); font-weight:bold;">❌ ${hasUsernameClash ? '用户名唯一冲突' : '激活手慢冲突'}</span>`;
        // 把当前脏数据用云端最新版本完全覆盖重载
        db.users = latestData.users;
        db.unused = latestData.unused;
        db.trash = latestData.trash;
        db.bitTasks = latestData.bitTasks || [];
        db.bitConnectors = latestData.bitConnectors || [];
        db.bitInventory = latestData.bitInventory || [];
        db.bitUsernameRegistry = latestData.bitUsernameRegistry || [];
        baseSnapshot = JSON.parse(JSON.stringify(db));
        lastKnownUpdatedAt = latestUpdatedAt;
        render();
        return;
    }

    db.users = mergedDb.users;
    db.unused = mergedDb.unused;
    db.trash = mergedDb.trash;
    db.bitTasks = mergedDb.bitTasks || [];
    db.bitConnectors = mergedDb.bitConnectors || [];
    db.bitInventory = mergedDb.bitInventory || [];
    db.bitUsernameRegistry = mergedDb.bitUsernameRegistry || [];
    
    baseSnapshot = JSON.parse(JSON.stringify(db));
    lastKnownUpdatedAt = latestUpdatedAt;
    
    // 静默保存合并后的结果
    saveToCloud(true);
    render();
    showLoading(false);
    
    // 提示合并成功
    document.getElementById('syncStatus').innerHTML = `<span style="color:var(--success); font-weight:bold;">✅ 已自动合并更改</span>`;
}

// ─────────────────── 核心渲染逻辑 ───────────────────

function render(noSort = false) {
    const container = document.getElementById('userTableBody');
    let displayData = db.users.filter(isOwnerInScope); // 小强版只显示归属为小强的用户
    
    const filters = {};
    document.querySelectorAll('.col-filter').forEach(i => {
        if(i.value) filters[i.dataset.col] = i.value.toLowerCase();
    });

    displayData = displayData.filter(u => {
        const statusMatch = currentFilter === 'all' || getStatus(u.expiry) === currentFilter;
        const columnMatch = Object.keys(filters).every(key => displayVal(u[key]).toLowerCase().includes(filters[key]));
        return statusMatch && columnMatch;
    });

    if(!noSort) {
        const toTs = (val) => {
            const s = normalizeDateStr(val);
            if (!s) return Number.POSITIVE_INFINITY;
            const t = new Date(s).getTime();
            return Number.isNaN(t) ? Number.POSITIVE_INFINITY : t;
        };
        displayData.sort((a,b) => {
            if (a.isStarred && !b.isStarred) return -1;
            if (!a.isStarred && b.isStarred) return 1;
            if (a.id === newlyActivatedId) return -1;
            return toTs(a.expiry) - toTs(b.expiry);
        });

    document.getElementById('statAmount').innerText = `/${displayData.reduce((s, u) => s + toNumber(u.amount), 0).toFixed(0)}`;

        tr.innerHTML = `
            <td>
                <span class="star-btn ${u.isStarred?'active':''}" onclick="toggleStar('${u.id}')">★</span>
                <input type="checkbox" class="user-cb" data-id="${u.id}" onclick="updateBatchBar()">

            <td class="editable" data-f="username"><b>${username}</b></td>
            <td class="editable" data-f="password">${password}</td>
            <td class="editable" data-f="wechat">${wechat}</td>
            <td class="editable" data-f="xianyu">${xianyu}</td>

                <button class="btn btn-ghost btn-sm" onclick="moveUserToTrash('${u.id}')">🗑️</button>

        tr.querySelectorAll('.editable').forEach(td => {
            let timer = null;
            td.onclick = () => { clearTimeout(timer); timer = setTimeout(() => copyToClipboard(td.innerText), 250); };
            td.ondblclick = () => { clearTimeout(timer); makeEditable(td, u.id, td.dataset.f); };
        });
        container.appendChild(tr);
    });
    renderBitIntegration();
}

function matchesTrashGlobalSearch(user, query) {
    const keyword = String(query || '').trim().toLowerCase();
    if (!keyword) return true;

    const searchableValues = [
        user?.username,
        user?.wechat,
        user?.xianyu,
        user?.owner,
        user?.remark,
        user?.remarks,
        user?.note,
        user?.notes,
        user?.memo,
        user?.comment,
        user?.comments,
        user?.['备注']
    ];

    return searchableValues.some(value =>
        String(value ?? '').toLowerCase().includes(keyword)
    );
}

function renderTrash() {
    const list = document.getElementById('trashList');
    const searchVal = (document.getElementById('trashSearchInput')?.value || '').trim().toLowerCase();

    let filtered = db.trash.filter(isOwnerInScope);
    if (searchVal) filtered = filtered.filter(u => matchesTrashGlobalSearch(u, searchVal));
    // 按到期日升序排列，'-' 视为最早。
    filtered = [...filtered].sort((a, b) => {
        const toTs = s => (s && s !== '-') ? new Date(s).getTime() : 0;
        return toTs(a.expiry) - toTs(b.expiry);
    });

    document.getElementById('trashUserCount').innerText = filtered.length;

    list.innerHTML = filtered.map(u => {
        const owner = escapeHtml(displayVal(u.owner));
        const username = escapeHtml(displayVal(u.username));
        const wechat = escapeHtml(displayVal(u.wechat));
        const xianyu = escapeHtml(displayVal(u.xianyu));
        const expiryShort = escapeHtml(formatShortDate(u.expiry));
        const amount = escapeHtml(displayVal(withDefault(u.amount, '0')));
        const bitStatus = String(u.bitSyncStatus || '');
        const bitBadge = u.bitJobId ? `<span class="bit-badge ${escapeHtml(bitStatus)}" title="${escapeHtml(u.bitSyncMessage || '')}">🔗 ${escapeHtml(BIT_STATUS_LABELS[bitStatus] || bitStatus || '待同步')}</span>` : '';
        return `
        <div class="trash-row">
            <input type="checkbox" class="trash-cb" value="${u.id}">
            <div class="trash-val trash-col-owner" title="${owner}">${owner}</div>
            <div class="trash-val trash-col-user" title="${username}"><b>${username}</b></div>
            <div class="trash-val trash-col-wechat" title="${wechat}">${wechat}</div>
            <div class="trash-val trash-col-xianyu" title="${xianyu}">${xianyu}</div>
            <div class="trash-val trash-col-expiry" style="color:var(--accent)">${expiryShort}</div>
            <div class="trash-val trash-col-amount">¥${amount}</div>
            <div class="trash-status">${bitBadge || '-'}</div>
            <div class="trash-actions" style="display:flex; gap:4px">
                <button class="btn btn-sm" style="padding:2px 6px; background:var(--warning); color:#000" onclick="rollbackTrashUser('${u.id}')">回退</button>
                <button class="btn btn-success btn-sm" style="padding:2px 6px" onclick="restore('${u.id}')">续费</button>
                <button class="btn btn-danger btn-sm" style="padding:2px 6px" onclick="permanentlyDelete('${u.id}')">删</button>
            </div>
        </div>
    `;
    }).join('') || '<div style="text-align:center; padding:40px; color:var(--text3)">回收站空空如也</div>';
}

async function activate(id) {
    const u = db.unused.find(x => x.id === id);
    if(!u) return;

    // ── 激活前先拉云端最新数据，防止两人同时激活同一个名额 ──
    showLoading(true);
    try {
        const { data, error } = await supabaseClient.from('MainData').select('content, updated_at').eq('id', ROW_ID).single();
        if (!error && data && data.content) {
            let parsed = data.content;
            if (typeof parsed === 'string') { try { parsed = JSON.parse(parsed); } catch(e) { parsed = {}; } }
            const cloudUnused = (parsed.unused || []);
            const stillAvailable = cloudUnused.some(x => x.id === id);
            if (!stillAvailable) {
                // 云端已经没有这个名额了，说明被别人抢走了
                showLoading(false);
                alert('⚠️ 手慢了！\n\n您要激活的名额【' + u.username + '】已被其他同事抢先激活！\n\n系统将自动为您刷新最新数据。');
                // 用云端最新数据覆盖本地
                lastKnownUpdatedAt = data.updated_at || 'FRESH';
                db = normalizeDb(parsed);
                baseSnapshot = JSON.parse(JSON.stringify(db));
                localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
                document.getElementById('syncStatus').innerText = `✅ 云端同步 ${getBeijingTimeString()}`;
                render();
                return;
            }
            // 云端有此名额，用最新快照更新本地状态（防止其他字段落伍）
            lastKnownUpdatedAt = data.updated_at || 'FRESH';
            db = normalizeDb(parsed);
            baseSnapshot = JSON.parse(JSON.stringify(db));
        }
    } catch(e) {
        console.warn('[activate] 激活前验证失败，继续本地激活', e);
    }
    showLoading(false);

    // ── 验证通过，执行激活 ──
    const slot = db.unused.find(x => x.id === id);
    if (!slot) {
        alert('⚠️ 名额数据异常，请刷新后重试！');
        render();
        return;
    }

    const d = new Date(Date.now() + 8 * 3600000);
    const activeTime = getBeijingDateStr();
    d.setUTCMonth(d.getUTCMonth() + 1);
    const ey = d.getUTCFullYear();
    const em = String(d.getUTCMonth() + 1).padStart(2, '0');
    const eday = String(d.getUTCDate()).padStart(2, '0');

    newlyActivatedId = id;
    db.users.push({ id: id, username: slot.username, password: slot.password, owner: DEFAULT_OWNER, wechat: '-', xianyu: '-', amount: DEFAULT_AMOUNT, windows: DEFAULT_WINDOWS, activeTime, expiry: `${ey}-${em}-${eday}`, isStarred: false });
    db.unused = db.unused.filter(x => x.id !== id);
    saveToCloud(); render();
}

function quickRenew(id) {
    const u = db.users.find(x => x.id === id);
    if (!u) return;
    
    let [y, m, day] = (normalizeDateStr(u.expiry) || getBeijingDateStr()).split('-');
    let target = new Date(`${y}-${String(m).padStart(2, '0')}-${String(day).padStart(2, '0')}T00:00:00Z`);
    
    target.setUTCDate(target.getUTCDate() + 30);
    
    const ey = target.getUTCFullYear();
    const em = String(target.getUTCMonth() + 1).padStart(2, '0');
    const eday = String(target.getUTCDate()).padStart(2, '0');
    u.expiry = `${ey}-${em}-${eday}`;
    
    newlyActivatedId = id; saveToCloud(); render();
}

async function moveUserToTrash(id, opts = {}) {
    const idx = db.users.findIndex(u => u.id === id);
    if(idx > -1) {
        const user = db.users[idx];
        showLoading(true);
        try {
            const key = user._bitPendingDisableKey || newBitDedupeKey('disable', user, 'trash-' + Date.now());
            user._bitPendingDisableKey = key;
            await enqueueBitJob(user, 'disable', key);
            delete user._bitPendingDisableKey;
            db.trash.unshift(db.users.splice(idx, 1)[0]);
            if (!opts.noSave) saveToCloud();
            if (!opts.noRender) render();
            return true;
        } catch (error) {
            delete user._bitPendingDisableKey;
            alert(`❌ ${user.username} 未能移入回收站：\n${bitSetupMessage(error)}\n\n为避免漏停员工号，本次前端操作已取消。`);
            return false;
        } finally {
            showLoading(false);
        }
    }
    return false;
}

function rollbackUser(id, opts = {}) {
    const idx = db.users.findIndex(u => u.id === id);
    const needConfirm = !opts.skipConfirm;
    if(idx > -1 && (needConfirm ? confirm("回退到名额列表？") : true)) {
        const u = db.users.splice(idx, 1)[0];
        db.unused.push({ id: u.id, username: u.username, password: u.password || DEFAULT_PWD });
        if (!opts.noSave) saveToCloud();
        if (!opts.noRender) render();
    }
}

function rollbackTrashUser(id) {
    const idx = db.trash.findIndex(u => u.id === id);
    if(idx > -1 && confirm("确定将此记录回退到待激活名额？")) {
        const u = db.trash.splice(idx, 1)[0];
        db.unused.push({ id: u.id, username: u.username, password: u.password || DEFAULT_PWD });

    }
}

async function permanentlyDelete(id) {
    const record = db.trash.find(u => u.id === id);
    if (!record) return;
    if (!confirm(`确定删除「${record.username}」？\n\n将生成联动任务：清空该员工号正常列表和回收站内的全部窗口，然后删除 BitBrowser 员工号。`)) return;
    showLoading(true);
    try {
        await enqueueBitJob(record, 'delete', newBitDedupeKey('delete', record));
        db.trash = db.trash.filter(u => u.id !== id);
        saveToCloud();
        renderTrash();
        render();
    } catch (error) {
        alert(`❌ 删除任务创建失败，前端记录未删除：\n${bitSetupMessage(error)}`);
    } finally {
        showLoading(false);
    }
}

function getRenewedExpiry(record) {
    let [y, m, day] = (normalizeDateStr(record.expiry) || getBeijingDateStr()).split('-');
    const target = new Date(`${y}-${String(m).padStart(2, '0')}-${String(day).padStart(2, '0')}T00:00:00Z`);
    target.setUTCDate(target.getUTCDate() + 30);
    return `${target.getUTCFullYear()}-${String(target.getUTCMonth() + 1).padStart(2, '0')}-${String(target.getUTCDate()).padStart(2, '0')}`;
}

async function restore(id) {
    const idx = db.trash.findIndex(u => u.id === id);
    if(idx > -1) {
        const restored = db.trash[idx];
        const newExpiry = getRenewedExpiry(restored);
        showLoading(true);
        try {
            const key = restored._bitPendingRecoverKey || newBitDedupeKey('recover', restored, `${newExpiry}-${Date.now()}`);
            restored._bitPendingRecoverKey = key;
            await enqueueBitJob(restored, 'recover', key);
            delete restored._bitPendingRecoverKey;
            db.trash.splice(idx, 1);
            restored.expiry = newExpiry;
            delete restored.operated;
            newlyActivatedId = restored.id;
            db.users.push(restored);
            saveToCloud();
            renderTrash();
            render();
        } catch (error) {
            delete restored._bitPendingRecoverKey;
            alert(`❌ ${restored.username} 续费失败：\n${bitSetupMessage(error)}\n\n为避免前端已恢复但 BitBrowser 仍停用，本次操作已取消。`);
        } finally {
            showLoading(false);
        }
    }
}

// ─── 用户名唯一性检查（excludeId 用于编辑时排除自身）───
function isUsernameUnique(username, excludeId = null) {
    const norm = String(username).trim().toLowerCase();
    const pools = [
        ...db.users.filter(u => u.id !== excludeId),
        ...db.unused.filter(u => u.id !== excludeId),
        ...db.trash.filter(u => u.id !== excludeId)
    ];
    return !pools.some(u => String(u.username || '').trim().toLowerCase() === norm);
}

function makeEditable(el, id, field) {
    const oldVal = el.innerText === '-' ? '' : el.innerText;
    const input = document.createElement('input');
    input.className = 'edit-input';
    if(field.includes('Time') || field === 'expiry') input.type = 'date';
    input.value = oldVal;
    el.innerHTML = ''; el.appendChild(input); input.focus();
    input.onblur = async () => {
      if (input._saved) return; // 防止重复触发
      input._saved = true;
      const newVal = input.value.trim() || '-';
      const u = db.users.find(x => x.id === id);
      if(u) {
        // 用户名字段需检查唯一性
        if (field === 'username') {
            if (newVal === '-') {
                alert('❌ 用户名不能为空。');
                render();
                return;
            }
            if (!isUsernameUnique(newVal, id)) {
                alert(`❌ 用户名「${newVal}」已存在（用户列表/名额/回收站中），请更换！`);
                render(); // 恢复原值
                return;
            }
            try {
                await reserveBitUsernames([{ id: u.id, username: newVal }]);
            } catch (error) {
                alert(`❌ 用户名未保存：\n${bitSetupMessage(error)}`);
                render();
                return;
            }
        }
        u[field] = newVal;
        saveToCloud();
      }
      render();
    };
    input.onkeydown = (e) => { if(e.key==='Enter') input.blur(); };
}
