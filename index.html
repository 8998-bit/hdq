<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户管理系统 Cloud Flow v5.1 (Supabase)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0d; --surface: #111318; --surface2: #181c24; --border: #252c3a; 
    --accent: #f0a500; --text: #e8ecf4; --text3: #4a5568; --danger: #ff4757; 
    --success: #2ed573; --warning: #ffa502; --unused: #a78bfa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'JetBrains Mono', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; overflow-y: scroll; }
  
  .header { position:sticky; top:0; z-index:100; background: rgba(10,11,13,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 10px 20px; display:flex; align-items:center; justify-content:space-between; }
  .logo { font-family:'Syne',sans-serif; font-weight:800; color: var(--accent); font-size: 1.2rem; }
  .sync-info { font-size: 10px; color: var(--text3); margin-left: 10px; }

  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: #000; padding: 8px 20px; border-radius: 4px; font-weight: bold; font-size: 12px; z-index: 9999; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4); }
  .toast.show { opacity: 1; transform: translate(-50%, 10px); }

  .stats-bar { display:grid; grid-template-columns:repeat(5, 1fr); gap:10px; padding: 20px; width: 98%; max-width: 1600px; margin:0 auto; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px; cursor:pointer; transition: 0.2s; }
  .stat-card.active { border: 2px solid var(--accent); background: var(--surface2); }
  .stat-label { font-size:10px; color:var(--text3); }
  .stat-value { font-family:'Syne',sans-serif; font-size:18px; font-weight: 800; }

  .unused-container { width: 98%; max-width: 1600px; margin: 0 auto 20px auto; padding: 0 20px; }
  .unused-box { background: rgba(167, 139, 250, 0.05); border: 1px dashed var(--unused); border-radius: 8px; padding: 12px; }
  .unused-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .unused-item { background: var(--surface2); border: 1px solid var(--border); padding: 3px 8px; border-radius: 4px; font-size: 11px; display: flex; align-items: center; gap: 6px; }

  .main-content { width: 98%; max-width: 1600px; margin:0 auto; padding:0 20px; }
  .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow-x: auto; }
  table { width:100%; border-collapse:collapse; min-width: 1100px; table-layout: fixed; }
  th { background:var(--surface2); color:var(--text3); font-size:11px; padding:12px 10px; text-align:left; border-bottom:1px solid var(--border); }
  
  td { padding:10px; font-size:13px; border-bottom:1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .header-stat { color: var(--accent); font-weight: 800; margin-left: 4px; }
  .editable { cursor: pointer; border-bottom: 1px dashed #444; position: relative; }
  .editable:hover { background: rgba(240,165,0,0.05); color: var(--accent); }
  
  .edit-input { background: #000; border: 1px solid var(--accent); color: #fff; width: 100%; padding: 4px; border-radius: 4px; font-family: inherit; outline: none; }
  .col-filter { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 10px; padding: 3px; margin-top: 5px; box-sizing: border-box; }
  
  .btn { padding: 6px 12px; border-radius:4px; border:none; cursor:pointer; font-size:11px; font-weight:600; display:inline-flex; align-items:center; justify-content: center; gap:4px; }
  .btn-sm { padding: 4px 8px; font-size: 10px; white-space: nowrap; }
  .btn-primary { background:var(--accent); color:#000; }
  .btn-success { background:var(--success); color:#000; }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border); }
  
  /* 操作列适配优化 */
  .action-cell { display: flex; gap: 4px; min-width: 150px; flex-wrap: nowrap; align-items: center; }

  .star-btn { cursor: pointer; font-size: 16px; color: var(--text3); transition: 0.2s; margin-right: 5px; vertical-align: middle; }
  .star-btn.active { color: var(--warning); text-shadow: 0 0 8px rgba(255,165,2,0.5); }

  .trash-drawer { position: fixed; right: -720px; top: 0; width: 720px; max-width: 95vw; height: 100%; background: var(--surface); border-left: 1px solid var(--border); transition: 0.3s; z-index: 101; padding: 20px; box-shadow: -10px 0 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; }
  .trash-drawer.open { right: 0; }
  .trash-list-wrap { flex: 1; overflow-y: auto; margin-top: 10px; }
  .trash-row { display: grid; grid-template-columns: 30px 1.2fr 1.5fr 1fr 1fr 0.8fr 0.7fr 130px; align-items: center; background: var(--surface2); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; margin-bottom: 6px; font-size: 11px; gap: 8px; }
  .trash-header { display: grid; grid-template-columns: 30px 1.2fr 1.5fr 1fr 1fr 0.8fr 0.7fr 130px; padding: 0 12px 8px 12px; color: var(--text3); font-size: 10px; gap: 8px; }
  .trash-val { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .trash-search { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 11px; padding: 5px 10px; font-family: inherit; outline: none; margin-bottom: 10px; }
  .trash-search:focus { border-color: var(--accent); }

  .batch-actions { background: var(--surface2); padding: 12px 20px; display: none; align-items: center; gap: 15px; position: fixed; bottom: 0; left: 0; right: 0; border-top: 2px solid var(--accent); z-index: 99; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 100; backdrop-filter: blur(2px); }
  .overlay.open { display: block; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:1000; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); padding:20px; border-radius:8px; width:380px; border:1px solid var(--border); }
  
  .loading-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; color: var(--accent); font-weight: bold; }
</style>
</head>
<body>

<div class="toast" id="toastMsg">已复制</div>
<div class="loading-mask" id="loadingMask">☁️ Supabase 同步中...</div>

<header class="header">
  <div style="display:flex; align-items:center">
    <div class="logo">⚡ CLOUD FLOW <small style="font-size: 10px; color: var(--text3)">V5.1</small></div>
    <span class="sync-info" id="syncStatus">连接中...</span>
  </div>
  <div style="display:flex; gap:8px;">
    <button class="btn btn-ghost" onclick="syncFromCloud()">🔄 强制刷新</button>
    <button class="btn btn-ghost" onclick="toggleTrash(true)">🗑️ 回收站 (<span id="trashCount">0</span>)</button>
    <button class="btn btn-ghost" onclick="downloadTemplate()">📥 导出模版</button>
    <label class="btn btn-ghost" style="cursor:pointer">📤 导入 Excel <input type="file" hidden accept=".xlsx, .xls" onchange="importExcel(this)"></label>
    <button class="btn btn-secondary" onclick="openMultiUnusedModal()" style="background:var(--unused); color:#000">＋ 批量增名额</button>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="unused-container">
  <div class="unused-box">
    <div style="font-size: 11px; color: var(--unused); font-weight: bold;">🔑 待激活名额</div>
    <div class="unused-list" id="unusedGrid"></div>
  </div>
</div>

<main class="main-content">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th width="50"><input type="checkbox" id="selectAll" onclick="toggleSelectAll('userTableBody', 'selectAll')"></th>
          <th width="90">归属<input type="text" class="col-filter" data-col="owner" value="小强" oninput="render()"></th>
          <th width="70">窗口 <span class="header-stat" id="statWindows">/ 0</span><input type="text" class="col-filter" data-col="windows" oninput="render()"></th>
          <th width="140">用户 <span class="header-stat" id="statUsers">/ 0</span><input type="text" class="col-filter" data-col="username" oninput="render()"></th>
          <th width="110">密码<input type="text" class="col-filter" data-col="password" oninput="render()"></th>
          <th width="100">微信<input type="text" class="col-filter" data-col="wechat" oninput="render()"></th>
          <th width="100">咸鱼<input type="text" class="col-filter" data-col="xianyu" oninput="render()"></th>
          <th width="115">激活时间<input type="text" class="col-filter" data-col="activeTime" oninput="render()"></th>
          <th width="115">到期日期<input type="text" class="col-filter" data-col="expiry" oninput="render()"></th>
          <th width="70">金额 <span class="header-stat" id="statAmount">/ 0</span><input type="text" class="col-filter" data-col="amount" oninput="render()"></th>
          <th width="80">状态</th>
          <th width="160">操作</th>
        </tr>
      </thead>
      <tbody id="userTableBody"></tbody>
    </table>
  </div>
</main>

<div class="batch-actions" id="batchBar">
  <span id="batchCountText" style="font-size:12px; font-weight:bold; color: var(--accent)">已选中 0 位用户</span>
  <button class="btn btn-ghost" onclick="exportSelected()">📥 导出选中</button>
  <button class="btn" style="background:var(--warning); color:#000;" onclick="batchAction('rollback')">批量回退</button>
  <button class="btn btn-danger" onclick="batchAction('delete')">批量移至回收站</button>
  <button class="btn btn-ghost" onclick="cancelSelect()">取消选择</button>
</div>

<div class="overlay" id="overlay" onclick="toggleTrash(false)"></div>
<div class="trash-drawer" id="trashDrawer">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">
    <h3 style="color:var(--danger)">🗑️ 回收站 <small style="font-size:10px; color:var(--text3)">· 仅显示小强</small></h3>
    <button class="btn btn-ghost" onclick="toggleTrash(false)">关闭</button>
  </div>
  <!-- 搜索框 -->
  <input type="text" class="trash-search" id="trashUsernameSearch" placeholder="🔍 搜索用户名...">
  <!-- 批量操作栏 -->
  <div style="display:flex; gap:10px; margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid var(--border); align-items:center;">
    <label style="font-size:12px; display:flex; align-items:center; gap:5px; cursor:pointer;">
        <input type="checkbox" id="selectAllTrash" onclick="toggleSelectAllTrash()"> 全选
    </label>
    <button class="btn btn-sm" style="background:var(--warning); color:#000;" onclick="batchRollbackTrash()">批量回退</button>
    <button class="btn btn-danger btn-sm" onclick="batchDeleteTrash()">永久删除</button>
    <button class="btn btn-ghost btn-sm" onclick="exportTrashSelected()">📥 批量导出</button>
  </div>
  
  <div class="trash-header">
    <div></div><div>用户名 <span id="trashResultCount" style="color:var(--accent)"></span></div><div>微信</div><div>咸鱼</div><div>到期(月日)</div><div>状态</div><div>金额</div><div>操作</div>
  </div>
  <div class="trash-list-wrap" id="trashList"></div>
</div>

<div class="modal-overlay" id="multiUnusedModal">
  <div class="modal">
    <h3 style="font-size:14px; margin-bottom:10px; color:var(--unused)">批量新增名额</h3>
    <textarea id="multiUnusedInput" style="width:100%; height:180px; background:#000; border:1px solid var(--border); color:#fff; padding:10px; font-size:12px" placeholder="用户名 密码 (一行一个)"></textarea>
    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:15px">
      <button class="btn btn-ghost" onclick="closeModal('multiUnusedModal')">取消</button>
      <button class="btn btn-secondary" onclick="confirmMultiUnused()" style="background:var(--unused)">确认添加</button>
    </div>
  </div>
</div>

<script>
// ================== 核心配置 ==================
const SUPABASE_URL = 'https://xlmnfzocrlqvbzzrdshr.supabase.co'; 
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhsbW5mem9jcmxxdmJ6enJkc2hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODMyMjAsImV4cCI6MjA5MDU1OTIyMH0.Pvhl7JTz-FmOZ6J_aT8kBRve3ZrjOIIVVekr4jTZXUM';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const STORAGE_KEY = 'uf_v45_db';
const ROW_ID = 1; 

const DEFAULT_WINDOWS = '100';
const DEFAULT_AMOUNT = '32';
const DEFAULT_PWD = '123456';
const DEFAULT_OWNER = '小强';

let db = { users: [], unused: [], trash: [] };
let currentFilter = 'all';
let newlyActivatedId = null;
let _isSaving = false;      // 保存锁，防止并发覆盖
let _saveTimer = null;      // 防抖定时器
let lastKnownUpdatedAt = null; // 【乐观锁】云端最后的时间戳版本

function getBeijingTime() {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    return new Date(utc + (3600000 * 8));
}

function formatShortDate(dateStr) {
    if(!dateStr || dateStr === '-') return '-';
    const d = new Date(dateStr);
    if(isNaN(d.getTime())) return dateStr;
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const r = String(d.getDate()).padStart(2, '0');
    return `${m}-${r}`;
}

function getStatus(dateStr) {
    if (!dateStr || dateStr === '-') return 'expired';
    const targetDate = new Date(dateStr);
    targetDate.setHours(0, 0, 0, 0);
    const today = getBeijingTime();
    today.setHours(0, 0, 0, 0);
    const diffDays = Math.ceil((targetDate - today) / 86400000);
    if (diffDays < 0) return 'expired';
    if (diffDays <= 3) return 'expiring';
    return 'active';
}

async function syncFromCloud() {
    // 如果正在保存，跳过同步，防止用旧数据覆盖正在保存的新数据
    if (_isSaving) {
        console.log('[sync] 正在保存中，跳过此次同步');
        return;
    }
    showLoading(true);
    try {
        const { data, error } = await supabaseClient.from('MainData').select('content, updated_at').eq('id', ROW_ID).single();
        if (error) throw error;
        if (data && data.content) {
            lastKnownUpdatedAt = data.updated_at || 'FRESH';
            let parsed = data.content;
            if (typeof parsed === 'string') {
                try { parsed = JSON.parse(parsed); } catch(e) { parsed = {}; }
            }
            db = { users: [], unused: [], trash: [], ...parsed };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            document.getElementById('syncStatus').innerText = `✅ 云端同步 ${getBeijingTime().toLocaleTimeString('zh-CN', {hour12:false})}`;
        }
        render();
    } catch (err) {
        console.error('[sync] 同步失败:', err);
        const local = localStorage.getItem(STORAGE_KEY);
        if (local) {
            try { db = { users: [], unused: [], trash: [], ...JSON.parse(local) }; render(); } catch(e) {}
        }
        document.getElementById('syncStatus').innerText = "❌ 同步失败";
    }
    showLoading(false);
}

// 防抖保存：多次快速编辑只触发一次上传
function saveToCloud() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ users: db.users, unused: db.unused, trash: db.trash }));
    document.getElementById('syncStatus').innerText = "☁️ 等待上传...";
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(() => _doSaveToCloud(), 500);
}

async function _doSaveToCloud() {
    if (_isSaving) {
        clearTimeout(_saveTimer);
        _saveTimer = setTimeout(() => _doSaveToCloud(), 600);
        return;
    }
    _isSaving = true;
    const statusEl = document.getElementById('syncStatus');
    statusEl.innerText = "☁️ 正在上传...";

    if (!lastKnownUpdatedAt) {
        alert("⚠️ 启动保护拒绝保存：\n您尚未成功获取过云端版本号。为防止意外覆盖他人的存档网络数据，请先点击【🔄 强制刷新】后再尝试进行操作！");
        statusEl.innerText = "❌ 警告: 缺少初始同步验证";
        _isSaving = false;
        return;
    }

    const payload = { users: db.users, unused: db.unused, trash: db.trash };
    const currentNow = new Date().toISOString();
    try {
        let opResult;
        if (lastKnownUpdatedAt === 'FRESH') {
            opResult = await supabaseClient.from('MainData').upsert({ id: ROW_ID, content: payload, updated_at: currentNow }).select();
        } else {
            opResult = await supabaseClient.from('MainData')
                .update({ content: payload, updated_at: currentNow })
                .eq('id', ROW_ID)
                .eq('updated_at', lastKnownUpdatedAt)
                .select();
        }

        if (opResult.error) throw opResult.error;

        if (lastKnownUpdatedAt !== 'FRESH' && (!opResult.data || opResult.data.length === 0)) {
            alert("⚠️ 极度危险：修改拦截！\n\n检测到【云端数据刚刚已被其他人修改最新数据】。\n由于您本地电脑停留的数据过旧，强行上传【会覆盖抹除别人的工作成果】！\n\n请点击右上角的「🔄 强制刷新」重新下载同步数据，而后再重新操作刚刚的字段。");
            statusEl.innerHTML = `<span style="color:var(--danger); font-weight:bold;">❌ 冲突拦截！必须刷新</span>`;
            _isSaving = false;
            return;
        }

        lastKnownUpdatedAt = currentNow;
        statusEl.innerText = `✅ 已同步 ${getBeijingTime().toLocaleTimeString('zh-CN', {hour12:false})}`;
    } catch (err) {
        console.error('[save] 上传失败:', err);
        statusEl.innerText = "⚠️ 仅本地保存";
    } finally {
        _isSaving = false;
    }
}

function render(noSort = false) {
    const container = document.getElementById('userTableBody');
    let displayData = [...db.users];
    
    const filters = {};
    document.querySelectorAll('.col-filter').forEach(i => {
        if(i.value) filters[i.dataset.col] = i.value.toLowerCase();
    });

    displayData = displayData.filter(u => {
        const ownerMatch = (u.owner || '').includes('小强');
        const statusMatch = currentFilter === 'all' || getStatus(u.expiry) === currentFilter;
        const columnMatch = Object.keys(filters).every(key => String(u[key] || '-').toLowerCase().includes(filters[key]));
        return ownerMatch && statusMatch && columnMatch;
    });

    if(!noSort) {
        displayData.sort((a,b) => {
            if (a.isStarred && !b.isStarred) return -1;
            if (!a.isStarred && b.isStarred) return 1;
            if (a.id === newlyActivatedId) return -1;
            return new Date(a.expiry) - new Date(b.expiry);
        });
    }

    document.getElementById('statWindows').innerText = `/ ${displayData.reduce((s, u) => s + parseInt(u.windows || 0), 0)}`;
    document.getElementById('statUsers').innerText = `/ ${displayData.length}`;
    document.getElementById('statAmount').innerText = `/ ${displayData.reduce((s, u) => s + parseFloat(u.amount || 0), 0).toFixed(0)}`;
    document.getElementById('trashCount').innerText = db.trash.length;

    renderStatsBar();
    renderUnusedGrid();

    container.innerHTML = '';
    displayData.forEach(u => {
        const tr = document.createElement('tr');
        const st = getStatus(u.expiry);
        if(u.id === newlyActivatedId) tr.style.background = "rgba(240,165,0,0.15)";
        
        tr.innerHTML = `
            <td>
                <span class="star-btn ${u.isStarred?'active':''}" onclick="toggleStar('${u.id}')">★</span>
                <input type="checkbox" class="user-cb" data-id="${u.id}" onclick="updateBatchBar()">
            </td>
            <td class="editable" data-f="owner">${u.owner || '-'}</td>
            <td class="editable" data-f="windows">${u.windows || DEFAULT_WINDOWS}</td>
            <td class="editable" data-f="username"><b>${u.username}</b></td>
            <td class="editable" data-f="password">${u.password || DEFAULT_PWD}</td>
            <td class="editable" data-f="wechat">${u.wechat||'-'}</td>
            <td class="editable" data-f="xianyu">${u.xianyu||'-'}</td>
            <td class="editable" data-f="activeTime">${u.activeTime || '-'}</td>
            <td class="editable" data-f="expiry">${u.expiry}</td>
            <td class="editable" data-f="amount" style="color:var(--accent)">${u.amount || DEFAULT_AMOUNT}</td>
            <td><span style="color:var(--${st}); font-size:10px; font-weight:bold">${st==='expiring'?'⚠️即将到期':st==='active'?'✅有效':'❌过期'}</span></td>
            <td>
                <div class="action-cell">
                    <button class="btn btn-success btn-sm" onclick="quickRenew('${u.id}')">续费</button>
                    <button class="btn btn-sm" style="background:var(--warning); color:#000;" onclick="rollbackUser('${u.id}')">回退</button>
                    <button class="btn btn-ghost btn-sm" onclick="moveUserToTrash('${u.id}')">🗑️</button>
                </div>
            </td>
        `;

        tr.querySelectorAll('.editable').forEach(td => {
            let timer = null;
            td.onclick = () => { clearTimeout(timer); timer = setTimeout(() => copyToClipboard(td.innerText), 250); };
            td.ondblclick = () => { clearTimeout(timer); makeEditable(td, u.id, td.dataset.f); };
        });
        container.appendChild(tr);
    });
}

function renderTrash() {
    const list = document.getElementById('trashList');
    const searchEl = document.getElementById('trashUsernameSearch');
    const query = (searchEl ? searchEl.value : '').toLowerCase().trim();

    // 只显示归属为小强的记录
    let baseData = db.trash.filter(u => (u.owner || '').includes('小强'));

    // 在小强的数据中按用户名搜索
    let data = query
        ? baseData.filter(u => (u.username || '').toLowerCase().includes(query))
        : [...baseData];

    // 按到期日期升序排列
    data.sort((a, b) => {
        const da = a.expiry && a.expiry !== '-' ? new Date(a.expiry) : new Date('9999-12-31');
        const db2 = b.expiry && b.expiry !== '-' ? new Date(b.expiry) : new Date('9999-12-31');
        return da - db2;
    });

    // 更新搜索结果数
    const countEl = document.getElementById('trashResultCount');
    if (countEl) countEl.textContent = query ? `(${data.length})` : `(${baseData.length})`;

    if (data.length === 0) {
        list.innerHTML = query
            ? `<div style="text-align:center; padding:40px; color:var(--text3)">搜索「${query}」无匹配结果</div>`
            : '<div style="text-align:center; padding:40px; color:var(--text3)">回收站空空如也</div>';
        return;
    }

    list.innerHTML = data.map(u => `
        <div class="trash-row">
            <input type="checkbox" class="trash-cb" value="${u.id}">
            <div class="trash-val" title="${u.username}"><b>${u.username}</b></div>
            <div class="trash-val" title="${u.wechat || '-'}">${u.wechat || '-'}</div>
            <div class="trash-val" title="${u.xianyu || '-'}">${u.xianyu || '-'}</div>
            <div class="trash-val" style="color:var(--accent)">${formatShortDate(u.expiry)}</div>
            <div>
                <button style="padding:0; height:15px; width:30px; border-radius:8px; background:var(--${!u.operated ? 'success' : 'danger'}); margin:0 auto; display:block; border:none; cursor:pointer;" onclick="toggleTrashOperated('${u.id}')" title="${!u.operated ? '未操作（点击标记已操作）' : '已操作（点击取消）'}"></button>
            </div>
            <div class="trash-val">¥${u.amount || '0'}</div>
            <div style="display:flex; gap:3px; flex-wrap:nowrap">
                <button class="btn btn-sm" style="padding:2px 5px; background:var(--warning); color:#000; font-size:10px" onclick="rollbackTrashUser('${u.id}')">回退</button>
                <button class="btn btn-success btn-sm" style="padding:2px 5px; font-size:10px" onclick="quickRenewTrashUser('${u.id}')">续费</button>
                <button class="btn btn-danger btn-sm" style="padding:2px 5px; font-size:10px" onclick="permanentlyDelete('${u.id}')">删</button>
            </div>
        </div>`).join('');
}

function toggleTrashOperated(id) {
    const u = db.trash.find(x => x.id === id);
    if(u) { u.operated = !u.operated; saveToCloud(); renderTrash(); }
}

// 续费还原：延期30天后移回用户列表
function quickRenewTrashUser(id) {
    const idx = db.trash.findIndex(u => u.id === id);
    if(idx === -1) return;
    if(!confirm('续费该用户30天并还原到用户列表？')) return;
    const u = db.trash.splice(idx, 1)[0];
    let d = new Date(u.expiry);
    if(isNaN(d.getTime()) || d < getBeijingTime()) d = getBeijingTime();
    d.setDate(d.getDate() + 30);
    u.expiry = d.toISOString().slice(0, 10);
    newlyActivatedId = u.id;
    db.users.push(u);
    saveToCloud(); renderTrash(); render();
}

function toggleStar(id) {
    const u = db.users.find(x => x.id === id);
    if(u) { u.isStarred = !u.isStarred; saveToCloud(); render(); }
}

function activate(id) {
    const u = db.unused.find(x => x.id === id);
    if(!u) return;
    const now = getBeijingTime();
    const activeTime = now.toISOString().slice(0,10);
    now.setMonth(now.getMonth() + 1);
    const newId = 'u_' + Date.now();
    newlyActivatedId = newId;
    db.users.push({ id: newId, username: u.username, password: u.password, owner: DEFAULT_OWNER, wechat: '-', xianyu: '-', amount: DEFAULT_AMOUNT, windows: DEFAULT_WINDOWS, activeTime, expiry: now.toISOString().slice(0,10), isStarred: false });
    db.unused = db.unused.filter(x => x.id !== id);
    saveToCloud(); render();
}

function quickRenew(id) {
    const u = db.users.find(x => x.id === id);
    if (!u) return;
    let d = new Date(u.expiry);
    if (d < getBeijingTime()) d = getBeijingTime();
    d.setDate(d.getDate() + 30);
    u.expiry = d.toISOString().slice(0, 10);
    newlyActivatedId = id; 
    saveToCloud(); render();
}

function moveUserToTrash(id) {
    const idx = db.users.findIndex(u => u.id === id);
    if(idx > -1) { db.trash.unshift(db.users.splice(idx, 1)[0]); saveToCloud(); render(); }
}

function rollbackUser(id) {
    const idx = db.users.findIndex(u => u.id === id);
    if(idx > -1 && confirm("确定回退到名额列表？")) {
        const u = db.users.splice(idx, 1)[0];
        db.unused.push({ id: 'un_'+Date.now()+Math.random(), username: u.username, password: u.password || DEFAULT_PWD });
        saveToCloud(); render();
    }
}

function rollbackTrashUser(id) {
    const idx = db.trash.findIndex(u => u.id === id);
    if(idx > -1 && confirm("确定将此记录回退到待激活名额？")) {
        const u = db.trash.splice(idx, 1)[0];
        db.unused.push({ id: 'un_'+Date.now()+Math.random(), username: u.username, password: u.password || DEFAULT_PWD });
        saveToCloud(); renderTrash(); render();
    }
}

function permanentlyDelete(id) {
    if(confirm("确定永久删除？")) { 
        db.trash = db.trash.filter(u => u.id !== id); 
        saveToCloud(); renderTrash(); render();
    }
}

function restore(id) {
    const idx = db.trash.findIndex(u => u.id === id);
    if(idx > -1) { 
        const restored = db.trash.splice(idx, 1)[0]; 
        newlyActivatedId = restored.id;
        db.users.push(restored); 
        saveToCloud(); renderTrash(); render();
    }
}

function renderStatsBar() {
    const filteredUsers = db.users.filter(u => (u.owner || '').includes('小强'));
    const s = { all: filteredUsers.length, active: filteredUsers.filter(u => getStatus(u.expiry) === 'active').length, expiring: filteredUsers.filter(u => getStatus(u.expiry) === 'expiring').length, expired: filteredUsers.filter(u => getStatus(u.expiry) === 'expired').length, unused: db.unused.length };
    const labels = { all:'总用户', active:'有效', expiring:'即将到期', expired:'已过期', unused:'待激活' };
    document.getElementById('statsBar').innerHTML = Object.keys(labels).map(k => `<div class="stat-card ${currentFilter===k?'active':''}" onclick="currentFilter='${k}';render()"><div class="stat-label">${labels[k]}</div><div class="stat-value" style="color:var(--${k==='all'?'accent':k})">${s[k]}</div></div>`).join('');
}

function renderUnusedGrid() {
    document.getElementById('unusedGrid').innerHTML = db.unused.map(u => `<div class="unused-item"><span>${u.username}</span><button class="btn btn-primary" style="height:18px; font-size:9px" onclick="activate('${u.id}')">激活</button></div>`).join('');
}

function makeEditable(el, id, field) {
    const oldVal = el.innerText === '-' ? '' : el.innerText;
    const input = document.createElement('input');
    input.className = 'edit-input';
    if(field.includes('Time') || field === 'expiry') input.type = 'date';
    input.value = oldVal;
    el.innerHTML = ''; el.appendChild(input); input.focus();
    input.onblur = () => {
      if (input._saved) return;
      input._saved = true;
      const u = db.users.find(x => x.id === id);
      if(u) {
        u[field] = input.value.trim() || '-';
        saveToCloud();
      }
      render();
    };
    input.onkeydown = (e) => { if(e.key==='Enter') input.blur(); };
}

function toggleSelectAll(cid, mid) { document.querySelectorAll(`#${cid} .user-cb`).forEach(cb => cb.checked = document.getElementById(mid).checked); updateBatchBar(); }
function updateBatchBar() { const count = document.querySelectorAll('#userTableBody .user-cb:checked').length; document.getElementById('batchBar').style.display = count > 0 ? 'flex' : 'none'; document.getElementById('batchCountText').innerText = `已选中 ${count} 位用户`; }
function cancelSelect() { document.getElementById('selectAll').checked = false; document.querySelectorAll('.user-cb').forEach(cb => cb.checked = false); updateBatchBar(); }
function batchAction(type) {
    const ids = Array.from(document.querySelectorAll(`.user-cb:checked`)).map(cb => cb.dataset.id);
    if (type === 'delete') ids.forEach(id => { const idx = db.users.findIndex(u => u.id === id); if(idx > -1) db.trash.unshift(db.users.splice(idx, 1)[0]); });
    if (type === 'rollback' && confirm("批量回退？")) ids.forEach(id => { const idx = db.users.findIndex(u => u.id === id); if(idx > -1) { const u = db.users.splice(idx, 1)[0]; db.unused.push({ id: 'un_'+Date.now()+Math.random(), username: u.username, password: u.password || DEFAULT_PWD }); } });
    cancelSelect(); saveToCloud(); render();
}

function toggleSelectAllTrash() { document.querySelectorAll('.trash-cb').forEach(cb => cb.checked = document.getElementById('selectAllTrash').checked); }
function batchRestoreTrash() { Array.from(document.querySelectorAll('.trash-cb:checked')).forEach(cb => restore(cb.value)); }
function batchDeleteTrash() { const ids = Array.from(document.querySelectorAll('.trash-cb:checked')).map(cb => cb.value); if(ids.length > 0 && confirm(`永久删除 ${ids.length} 项？`)) { db.trash = db.trash.filter(u => !ids.includes(u.id)); saveToCloud(); renderTrash(); render(); } }
function exportTrashSelected() { const ids = Array.from(document.querySelectorAll('.trash-cb:checked')).map(cb => cb.value); const list = ids.length > 0 ? db.trash.filter(u => ids.includes(u.id)) : db.trash; if(list.length === 0) return alert('回收站为空'); const ws = XLSX.utils.json_to_sheet(list.map(u => ({"归属": u.owner||'-', "窗口数": u.windows||'', "用户名": u.username, "密码": u.password||'', "微信": u.wechat||'-', "咸鱼": u.xianyu||'-', "激活时间": u.activeTime||'-', "金额": u.amount||'0', "到期日期": u.expiry||'-'}))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "回收站导出"); XLSX.writeFile(wb, `回收站导出_${Date.now()}.xlsx`); }
function batchRollbackTrash() {
    const ids = Array.from(document.querySelectorAll('.trash-cb:checked')).map(cb => cb.value);
    if(ids.length > 0 && confirm(`确定将选中的 ${ids.length} 项回退到待激活名额？`)) {
        db.trash = db.trash.filter(u => {
            if(ids.includes(u.id)) {
                db.unused.push({ id: 'un_'+Date.now()+Math.random(), username: u.username, password: u.password || DEFAULT_PWD });
                return false;
            }
            return true;
        });
        saveToCloud(); renderTrash(); render();
    }
}

function importExcel(input) {
    const r = new FileReader();
    r.onload = (e) => {
        const json = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).SheetNames[0]]);
        json.forEach(row => { if(row["用户名"]) db.users.push({ id: 'u_'+Date.now()+Math.random(), owner: DEFAULT_OWNER, windows: row["窗口数"]||DEFAULT_WINDOWS, username: String(row["用户名"]), password: String(row["密码"]||DEFAULT_PWD), wechat: row["微信"]||'-', xianyu: row["咸鱼"]||'-', activeTime: row["激活时间"]||'-', amount: row["金额"]||DEFAULT_AMOUNT, expiry: row["到期日期"]||'-', isStarred: false }); });
        saveToCloud(); render(); input.value = '';
    };
    r.readAsArrayBuffer(input.files[0]);
}

function downloadTemplate() { const ws = XLSX.utils.aoa_to_sheet([["归属","窗口数", "用户名", "密码", "微信", "咸鱼", "激活时间", "金额", "到期日期"]]); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "模版"); XLSX.writeFile(wb, "导入模版.xlsx"); }
function exportSelected() { const ids = Array.from(document.querySelectorAll(`.user-cb:checked`)).map(cb => cb.dataset.id); const ws = XLSX.utils.json_to_sheet(db.users.filter(u => ids.includes(u.id)).map(u => ({"归属": u.owner, "窗口数": u.windows, "用户名": u.username, "密码": u.password, "微信": u.wechat, "咸鱼": u.xianyu, "激活时间": u.activeTime, "金额": u.amount, "到期日期": u.expiry}))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "导出"); XLSX.writeFile(wb, `用户导出_${Date.now()}.xlsx`); }
function confirmMultiUnused() { const input = document.getElementById('multiUnusedInput').value; input.split('\n').filter(line => line.trim()).forEach(line => { const p = line.trim().split(/\s+/); db.unused.push({ id: 'un_'+Date.now()+Math.random(), username: p[0], password: p[1]||DEFAULT_PWD }); }); saveToCloud(); closeModal('multiUnusedModal'); render(); }
function openMultiUnusedModal() { document.getElementById('multiUnusedModal').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function toggleTrash(s) {
    document.getElementById('trashDrawer').classList.toggle('open', s);
    document.getElementById('overlay').classList.toggle('open', s);
    if (s) {
        // 打开时刷新列表（保留搜索词，用户可能是切回来继续搜）
        renderTrash();
        // 自动聚焦搜索框，方便直接输入
        setTimeout(() => document.getElementById('trashUsernameSearch')?.focus(), 300);
    } else {
        // 关闭时清空搜索框，避免下次打开时残留过滤词
        const searchEl = document.getElementById('trashUsernameSearch');
        if (searchEl) searchEl.value = '';
    }
}
function copyToClipboard(text) { if (!text || text === '-') return; const input = document.createElement('textarea'); input.value = text; document.body.appendChild(input); input.select(); document.execCommand('copy'); document.body.removeChild(input); document.getElementById('toastMsg').classList.add('show'); setTimeout(() => document.getElementById('toastMsg').classList.remove('show'), 1500); }
function showLoading(s) { document.getElementById('loadingMask').style.display = s ? 'flex' : 'none'; }

// 页面加载：先从 localStorage 快速恢复，再从云端同步
(function initLoad() {
    const local = localStorage.getItem(STORAGE_KEY);
    if (local) {
        try {
            db = { users: [], unused: [], trash: [], ...JSON.parse(local) };
            render();
        } catch(e) {}
    }
    syncFromCloud();

    // 用 JS 绑定搜索事件（双保险，防止 HTML attribute 失效）
    const searchEl = document.getElementById('trashUsernameSearch');
    if (searchEl) {
        searchEl.addEventListener('input', () => renderTrash());
        searchEl.addEventListener('keydown', (e) => { if(e.key === 'Escape') { searchEl.value = ''; renderTrash(); } });
    }
})();

window.addEventListener('beforeunload', () => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ users: db.users, unused: db.unused, trash: db.trash }));
});
setInterval(() => render(true), 600000);
</script>
